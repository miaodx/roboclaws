name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Needed by the deploy-pages job (push to main only) to publish report.html
# to https://miaodx.github.io/roboclaws/ via GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint + mock tests (every push and PR)
  # ---------------------------------------------------------------------------
  lint-and-mock:
    name: Lint & mock tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      # Cache the AI2-THOR Unity binary (~1 GB) so it doesn't re-download each run.
      # The cache is populated on first run; subsequent runs restore instantly.
      - name: Cache AI2-THOR Unity build
        uses: actions/cache@v4
        with:
          path: ~/.ai2thor
          key: ${{ runner.os }}-ai2thor-v1

      # Xvfb provides a virtual display for AI2-THOR's Unity renderer.
      # libgl1 / libglib2.0-0 are runtime libraries Unity needs on Linux.
      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y xvfb libgl1 libglib2.0-0

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff check)
        run: ruff check .

      - name: Format check (ruff format --check)
        run: ruff format --check .

      # All current tests use unittest.mock — no Unity build needed.
      # Future AI2-THOR integration tests should be wrapped with xvfb-run.
      - name: Run tests
        run: pytest

      # Drive the territory and coverage examples against a mocked engine so
      # every push produces a browsable report.html artifact (issue #15).
      # No AI2-THOR / Unity / API keys required.
      - name: Generate demo HTML reports
        run: python scripts/generate_demo_report.py --output-dir output/demo --steps 30

      - name: Upload HTML reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-mock
          path: output/demo/**
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Job 2: Real-model smoke test (push to main only, to control API cost)
  # ---------------------------------------------------------------------------
  real-model-smoke:
    name: Real-model smoke test (Kimi)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      # Share the AI2-THOR Unity build cache with the mock job (~1 GB).
      - name: Cache AI2-THOR Unity build
        uses: actions/cache@v4
        with:
          path: ~/.ai2thor
          key: ${{ runner.os }}-ai2thor-v1

      # Xvfb + GL runtime libs are required for the headless Unity renderer.
      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y xvfb libgl1 libglib2.0-0

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      # Validate that the secret is set and the Kimi API returns a parseable
      # JSON action.  Cost: ~$0.0001 per run.
      - name: Validate KIMI_API_KEY
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
        run: python scripts/check_kimi_key.py

      # Real smoke test: territory game driven by Kimi inside a real AI2-THOR
      # scene.  Budget is 100 steps so the #41 termination logic (all reachable
      # cells claimed, or 2*agent_count stale steps) can actually fire for the
      # right reason instead of always hitting max_steps at step 5.  Kimi cost
      # is ~2 cents per 100-step agent → ~4 cents for this step.
      - name: Run territory smoke game (Kimi + AI2-THOR)
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
        run: |
          xvfb-run -a python examples/territory_game.py \
            --model kimi --agents 2 --steps 100 \
            --output-dir output/smoke/territory

      - name: Generate HTML report from smoke replay
        run: python -m roboclaws.core.reporter output/smoke/territory

      # Cooperative counterpart of the territory smoke.  Same 100-step budget
      # so the coverage-game 95% early-termination re-enabled by #41 has a real
      # chance to fire before max_steps.  Total push cost stays well under the
      # "few cents per run" budget noted above.
      - name: Run coverage smoke game (Kimi + AI2-THOR)
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
        run: |
          xvfb-run -a python examples/coverage_game.py \
            --model kimi --agents 2 --steps 100 \
            --output-dir output/smoke/coverage

      - name: Generate HTML report from coverage smoke replay
        run: python -m roboclaws.core.reporter output/smoke/coverage

      - name: Upload smoke replay + HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-real-model
          path: output/smoke/**
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Job 3: Optional Railway-hosted OpenClaw integration smoke (issue #40).
  #
  # Complements the in-CI / ephemeral OpenClaw smoke (#39) by proving that our
  # bridge can talk to the user's long-running, persistent Railway deployment.
  # Runs on push to main only and is non-blocking: if Railway is down, the job
  # turns yellow but does NOT fail the overall CI run. The user can read this
  # job's history as a poor-man's Railway uptime check.
  # ---------------------------------------------------------------------------
  openclaw-railway-smoke:
    name: OpenClaw Railway integration (optional)
    runs-on: ubuntu-latest
    needs: lint-and-mock
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # Job-level continue-on-error makes the whole job non-blocking — a Railway
    # outage shows yellow on the run summary, never red.
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      # Share the AI2-THOR Unity build cache with the other jobs (~1 GB).
      - name: Cache AI2-THOR Unity build
        uses: actions/cache@v4
        with:
          path: ~/.ai2thor
          key: ${{ runner.os }}-ai2thor-v1

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y xvfb libgl1 libglib2.0-0

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      # Step-level continue-on-error: skip the game gracefully if Railway is
      # unreachable (cold start, deploy in progress, outright outage). Both
      # this and the job-level guard are needed — the step guard prevents
      # burning Kimi credits on a failed call, the job guard keeps the run
      # green overall.
      - name: Preflight Railway Gateway
        id: preflight
        continue-on-error: true
        env:
          OPENCLAW_RAILWAY_URL: ${{ secrets.OPENCLAW_RAILWAY_URL }}
          OPENCLAW_RAILWAY_TOKEN: ${{ secrets.OPENCLAW_RAILWAY_TOKEN }}
        run: |
          if [ -z "${OPENCLAW_RAILWAY_URL}" ]; then
            echo "::warning::OPENCLAW_RAILWAY_URL secret not set, skipping Railway smoke"
            exit 1
          fi
          # Be generous with retries — Railway free tier can cold-start slowly.
          for i in 1 2 3 4 5; do
            if curl -fsS --max-time 10 \
                -H "Authorization: Bearer ${OPENCLAW_RAILWAY_TOKEN}" \
                "${OPENCLAW_RAILWAY_URL%/}/readyz"; then
              exit 0
            fi
            echo "Railway readyz attempt $i failed, retrying..."
            sleep $((i * 2))
          done
          echo "::warning::Railway Gateway unreachable after 5 attempts, skipping"
          exit 1

      # Minimal smoke (3 steps, 2 agents) — the bigger 5-step run lives in the
      # ephemeral OpenClaw job (#39). This one only proves the live deployment
      # is reachable from our bridge and accepts our payload end-to-end.
      - name: Run 3-step territory game against Railway
        if: steps.preflight.outcome == 'success'
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          OPENCLAW_GATEWAY_URL: ${{ secrets.OPENCLAW_RAILWAY_URL }}
          OPENCLAW_GATEWAY_TOKEN: ${{ secrets.OPENCLAW_RAILWAY_TOKEN }}
        run: |
          xvfb-run -a python examples/territory_game.py \
            --backend openclaw --model kimi --agents 2 --steps 3 \
            --output-dir output/openclaw-railway/territory

      - name: Generate HTML report from Railway smoke replay
        if: steps.preflight.outcome == 'success'
        run: python -m roboclaws.core.reporter output/openclaw-railway/territory

      # Separate artifact name from the ephemeral OpenClaw smoke so the two can
      # be diffed side-by-side when investigating drift.
      - name: Upload Railway smoke replay + HTML report
        if: always() && steps.preflight.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: report-openclaw-railway
          path: output/openclaw-railway/**
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Job 4: Ephemeral OpenClaw multi-agent smoke (issue #39).
  #
  # Spins up an OpenClaw Gateway as a Docker container alongside the job, mounts
  # our skill into its workspace, waits for /healthz + /readyz, then runs
  # territory + coverage games via `--backend openclaw`. Reports land at
  # /openclaw/territory/ and /openclaw/coverage/ via the publish-pages job.
  #
  # The job is guarded with `continue-on-error: true` at the job level plus
  # step-level guards so a mismatch between the real OpenClaw Docker image and
  # our wiring degrades to a yellow warning rather than blocking `main`. Image
  # tag and workspace layout are the two bits most likely to drift — see the
  # `Start OpenClaw Gateway` step for the expected contract.
  # ---------------------------------------------------------------------------
  openclaw-smoke:
    name: OpenClaw ephemeral integration (Kimi)
    runs-on: ubuntu-latest
    needs: lint-and-mock
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    continue-on-error: true

    env:
      # Override via repository variable if upstream renames the image.
      OPENCLAW_IMAGE: ${{ vars.OPENCLAW_IMAGE || 'ghcr.io/openclaw/openclaw:latest' }}
      OPENCLAW_GATEWAY_URL: http://localhost:18789

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Cache AI2-THOR Unity build
        uses: actions/cache@v4
        with:
          path: ~/.ai2thor
          key: ${{ runner.os }}-ai2thor-v1

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y xvfb libgl1 libglib2.0-0

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      # Generate a per-run bearer token so the Gateway and bridge share the
      # same secret without needing a long-lived repo secret.
      - name: Mint per-run Gateway token
        id: token
        run: echo "value=$(python -c 'import secrets;print(secrets.token_urlsafe(32))')" >> "$GITHUB_OUTPUT"

      # Pull the image up-front so a renamed tag fails fast (and is caught by
      # continue-on-error) rather than deep in the container run.
      - name: Pull OpenClaw Gateway image
        id: pull
        continue-on-error: true
        run: docker pull "$OPENCLAW_IMAGE"

      # Start the Gateway in the background with our skill mounted at the path
      # the Gateway scans on boot. The exact workspace path + env-var names are
      # the OpenClaw integration contract; if upstream changes either, update
      # them here.
      - name: Start OpenClaw Gateway
        if: steps.pull.outcome == 'success'
        id: gateway
        continue-on-error: true
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          GATEWAY_TOKEN: ${{ steps.token.outputs.value }}
        run: |
          docker run -d --name openclaw-gateway \
            -p 18789:18789 \
            -v "$PWD/skills/ai2thor-navigator:/home/node/.openclaw/workspace/skills/ai2thor-navigator:ro" \
            -e OPENCLAW_AUTH_MODE=token \
            -e OPENCLAW_AUTH_TOKEN="$GATEWAY_TOKEN" \
            -e OPENCLAW_ALLOWED_TOOLS=ai2thor-navigator \
            -e KIMI_API_KEY="$KIMI_API_KEY" \
            "$OPENCLAW_IMAGE"

      # Recent OpenClaw images persist auth under /home/node/.openclaw and may
      # ignore the env token we try to inject. Read the live config so the
      # bridge uses the bearer token the container actually booted with.
      - name: Resolve Gateway token from container config
        id: resolved_token
        if: steps.gateway.outcome == 'success'
        continue-on-error: true
        env:
          MINTED_GATEWAY_TOKEN: ${{ steps.token.outputs.value }}
        run: |
          RAW_CONFIG="$(docker exec openclaw-gateway sh -lc 'cat /home/node/.openclaw/openclaw.json' || true)"
          RESOLVED_TOKEN="$(RAW_CONFIG="$RAW_CONFIG" python -c 'import json, os; raw = os.environ.get("RAW_CONFIG", ""); print(json.loads(raw).get("gateway", {}).get("auth", {}).get("token", "") if raw else "")' 2>/dev/null || true)"
          if [ -z "$RESOLVED_TOKEN" ]; then
            echo "::warning::Could not read gateway.auth.token from container config; falling back to minted token"
            RESOLVED_TOKEN="$MINTED_GATEWAY_TOKEN"
          fi
          echo "value=$RESOLVED_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Wait for Gateway readiness
        id: preflight
        if: steps.gateway.outcome == 'success'
        continue-on-error: true
        env:
          GATEWAY_TOKEN: ${{ steps.resolved_token.outputs.value || steps.token.outputs.value }}
        run: |
          for i in $(seq 1 30); do
            if curl -fsS --max-time 5 \
                -H "Authorization: Bearer ${GATEWAY_TOKEN}" \
                "${OPENCLAW_GATEWAY_URL}/readyz"; then
              echo "Gateway ready after ${i} attempts"
              exit 0
            fi
            sleep 2
          done
          echo "::warning::Gateway did not become ready within 60s"
          docker logs openclaw-gateway || true
          exit 1

      # 5 steps × 2 agents keeps this job under the ~3-4 min budget from #39.
      # The 100-step deep smoke still lives in `real-model-smoke`; this job
      # only proves the OpenClaw transport + skill mount end-to-end.
      - name: Run territory game via OpenClaw
        if: steps.preflight.outcome == 'success'
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          OPENCLAW_GATEWAY_TOKEN: ${{ steps.resolved_token.outputs.value || steps.token.outputs.value }}
        run: |
          xvfb-run -a python examples/territory_game.py \
            --backend openclaw --model kimi --agents 2 --steps 5 \
            --output-dir output/openclaw/territory

      - name: Generate territory HTML report
        if: steps.preflight.outcome == 'success'
        run: python -m roboclaws.core.reporter output/openclaw/territory

      - name: Run coverage game via OpenClaw
        if: steps.preflight.outcome == 'success'
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          OPENCLAW_GATEWAY_TOKEN: ${{ steps.resolved_token.outputs.value || steps.token.outputs.value }}
        run: |
          xvfb-run -a python examples/coverage_game.py \
            --backend openclaw --model kimi --agents 2 --steps 5 \
            --output-dir output/openclaw/coverage

      - name: Generate coverage HTML report
        if: steps.preflight.outcome == 'success'
        run: python -m roboclaws.core.reporter output/openclaw/coverage

      - name: Dump Gateway logs on failure
        if: failure() && steps.gateway.outcome == 'success'
        run: docker logs openclaw-gateway || true

      - name: Stop Gateway
        if: always() && steps.gateway.outcome == 'success'
        run: docker rm -f openclaw-gateway || true

      - name: Upload OpenClaw reports
        if: always() && steps.preflight.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: report-openclaw
          path: output/openclaw/**
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Job 5: Publish the latest reports to GitHub Pages (main only).
  # Combines the mock-engine demo (fast, every-push visualization of the report
  # infrastructure), the real AI2-THOR + Kimi smoke output, and — when
  # available — the ephemeral OpenClaw reports into a single site served from
  # https://<owner>.github.io/<repo>/.
  # ---------------------------------------------------------------------------
  publish-pages:
    name: Publish reports to GitHub Pages
    # openclaw-smoke is listed but not hard-required: its `continue-on-error`
    # means a failure surfaces as yellow and does NOT skip publish-pages. The
    # download step below is best-effort so a missing artifact just omits the
    # OpenClaw section from the landing page.
    needs: [lint-and-mock, real-model-smoke, openclaw-smoke]
    if: |
      always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
      && needs.lint-and-mock.result == 'success'
      && needs.real-model-smoke.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Need the repo checked out so scripts/write_pages_index.py is available.
      - uses: actions/checkout@v4

      - name: Download mock demo artifact
        uses: actions/download-artifact@v4
        with:
          name: report-mock
          path: site

      - name: Download real-model smoke artifact
        uses: actions/download-artifact@v4
        with:
          name: report-real-model
          path: smoke-src

      # Best-effort: runs where openclaw-smoke degraded to yellow won't have
      # this artifact. `continue-on-error` keeps Pages publishing regardless.
      - name: Download OpenClaw smoke artifact (best-effort)
        id: download_openclaw
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: report-openclaw
          path: openclaw-src

      # Slot replays at /smoke/{territory,coverage}/ and (when present)
      # /openclaw/{territory,coverage}/, then rewrite index.html so the landing
      # page exposes every stack side-by-side.
      - name: Assemble Pages site
        run: |
          mkdir -p site/smoke
          cp -r smoke-src/territory site/smoke/territory
          cp -r smoke-src/coverage site/smoke/coverage
          INDEX_FLAGS="--include-smoke"
          if [ -d openclaw-src/territory ] && [ -d openclaw-src/coverage ]; then
            mkdir -p site/openclaw
            cp -r openclaw-src/territory site/openclaw/territory
            cp -r openclaw-src/coverage site/openclaw/coverage
            INDEX_FLAGS="$INDEX_FLAGS --include-openclaw"
          fi
          python scripts/write_pages_index.py site $INDEX_FLAGS

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
