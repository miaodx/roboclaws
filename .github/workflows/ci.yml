name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:
    inputs:
      molmo_live:
        description: "Run the opt-in MolmoSpaces live cleanup matrix"
        required: false
        default: "true"

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

jobs:
  lint-and-mock:
    name: Lint & mock tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install just
        env:
          JUST_VERSION: "1.50.0"
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL "https://github.com/casey/just/releases/download/${JUST_VERSION}/just-${JUST_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | tar -xz -C "$HOME/.local/bin" just
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/just" --version

      - name: Install Python dependencies
        run: uv sync --extra dev

      - name: Run required PR gate
        run: just agent::verify ci-required

      - name: Upload required-gate output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-required
          path: output/demo/**
          if-no-files-found: warn

  molmo-live-cleanup:
    name: Molmo live cleanup (${{ matrix.model_entry }})
    runs-on: ubuntu-latest
    needs: lint-and-mock
    if: |
      (
        github.event_name == 'workflow_dispatch'
        && github.event.inputs.molmo_live == 'true'
      )
      || (
        github.event_name == 'push'
        && github.ref == 'refs/heads/main'
        && contains(github.event.head_commit.message, '[molmo-live]')
      )
    continue-on-error: true
    timeout-minutes: 75
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        model_entry:
          - claude-code-mimo-v2.5
          - claude-code-kimi-k2.6
          - agents-sdk-mimo-v2.5
          - agents-sdk-kimi-k2.7-code

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: ${{ runner.os }}-uv-

      - name: Cache MolmoSpaces runtime assets
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/molmospaces
            ~/.cache/molmo-spaces-resources
          key: ${{ runner.os }}-molmospaces-rby1m-seed7-v1
          restore-keys: ${{ runner.os }}-molmospaces-

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y xvfb libgl1 libglib2.0-0 tmux

      - name: Install just
        env:
          JUST_VERSION: "1.50.0"
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL "https://github.com/casey/just/releases/download/${JUST_VERSION}/just-${JUST_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | tar -xz -C "$HOME/.local/bin" just
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/just" --version

      - name: Install Python dependencies
        run: uv sync --extra dev --extra molmospaces

      - name: Build pinned coding-agent CLI image
        env:
          ROBOCLAWS_CODE_AGENT_IMAGE: roboclaws-coding-agents:${{ github.run_id }}-${{ matrix.model_entry }}
        run: |
          scripts/dev/coding_agent_docker.sh build
          scripts/dev/coding_agent_docker.sh install-wrappers .tmp/coding-agent-bin
          echo "$PWD/.tmp/coding-agent-bin" >> "$GITHUB_PATH"
          .tmp/coding-agent-bin/claude --version

      - name: Run Molmo live cleanup entry
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          MIMO_TP_KEY: ${{ secrets.MIMO_TP_KEY }}
        run: |
          xvfb-run -a .venv/bin/python scripts/molmo_cleanup/run_ci_live_cleanup_matrix.py \
            --entry "${{ matrix.model_entry }}" \
            --output-dir output/molmo/ci-live \
            --published-dir output/molmo/ci-live-published \
            --skip-uv-sync

      - name: Upload Molmo live report/status
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-molmo-live-${{ matrix.model_entry }}
          path: output/molmo/ci-live-published/${{ matrix.model_entry }}/**
          if-no-files-found: warn

  model-provider-health:
    name: Model provider health
    runs-on: ubuntu-latest
    needs: lint-and-mock
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python dependencies
        run: uv sync --extra dev

      - name: Check configured provider routes
        env:
          MM_BASE_URL: ${{ secrets.MM_BASE_URL }}
          MM_API_KEY: ${{ secrets.MM_API_KEY }}
          MIMO_TP_KEY: ${{ secrets.MIMO_TP_KEY }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
        run: |
          .venv/bin/python scripts/dev/check_model_providers.py \
            --profile agents-sdk-public \
            --dotenv "" \
            --require-all

  publish-pages:
    name: Publish reports to GitHub Pages
    needs: [lint-and-mock, molmo-live-cleanup]
    if: |
      always()
      && needs.lint-and-mock.result == 'success'
      && github.ref == 'refs/heads/main'
      && (
        github.event_name == 'workflow_dispatch'
        || (
          github.event_name == 'push'
          && contains(github.event.head_commit.message, '[molmo-live]')
        )
      )
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Download Molmo live Claude Code MiMo artifact
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: report-molmo-live-claude-code-mimo-v2.5
          path: molmo-live-src/claude-code-mimo-v2.5

      - name: Download Molmo live Claude Code Kimi artifact
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: report-molmo-live-claude-code-kimi-k2.6
          path: molmo-live-src/claude-code-kimi-k2.6

      - name: Download Molmo live Agents SDK MiMo artifact
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: report-molmo-live-agents-sdk-mimo-v2.5
          path: molmo-live-src/agents-sdk-mimo-v2.5

      - name: Download Molmo live Agents SDK Kimi artifact
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: report-molmo-live-agents-sdk-kimi-k2.7-code
          path: molmo-live-src/agents-sdk-kimi-k2.7-code

      - name: Assemble Pages site
        run: |
          mkdir -p site
          if [ -d molmo-live-src ]; then
            python3 scripts/molmo_cleanup/assemble_ci_live_pages.py molmo-live-src site/molmo/live
          fi
          python3 scripts/reports/write_pages_index.py site --include-molmo-live

      - name: Prune public Pages artifact
        run: python3 -m roboclaws.devtools.pages_site site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
