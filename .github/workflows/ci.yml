name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Needed by the deploy-pages job (push to main only) to publish report.html
# to https://miaodx.github.io/roboclaws/ via GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint + mock tests (every push and PR)
  # ---------------------------------------------------------------------------
  lint-and-mock:
    name: Lint & mock tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      # Cache the AI2-THOR Unity binary (~1 GB) so it doesn't re-download each run.
      # The cache is populated on first run; subsequent runs restore instantly.
      - name: Cache AI2-THOR Unity build
        uses: actions/cache@v4
        with:
          path: ~/.ai2thor
          key: ${{ runner.os }}-ai2thor-v1

      # Xvfb provides a virtual display for AI2-THOR's Unity renderer.
      # libgl1 / libglib2.0-0 are runtime libraries Unity needs on Linux.
      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y xvfb libgl1 libglib2.0-0

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff check)
        run: ruff check .

      - name: Format check (ruff format --check)
        run: ruff format --check .

      # All current tests use unittest.mock — no Unity build needed.
      # Future AI2-THOR integration tests should be wrapped with xvfb-run.
      - name: Run tests
        run: pytest

      # Drive the territory and coverage examples against a mocked engine so
      # every push produces a browsable report.html artifact (issue #15).
      # No AI2-THOR / Unity / API keys required.
      - name: Generate demo HTML reports
        run: python scripts/generate_demo_report.py --output-dir output/demo --steps 30

      - name: Upload HTML reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-mock
          path: output/demo/**
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Job 2: Real-model smoke test (push to main only, to control API cost)
  # ---------------------------------------------------------------------------
  real-model-smoke:
    name: Real-model smoke test (Kimi)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      # Share the AI2-THOR Unity build cache with the mock job (~1 GB).
      - name: Cache AI2-THOR Unity build
        uses: actions/cache@v4
        with:
          path: ~/.ai2thor
          key: ${{ runner.os }}-ai2thor-v1

      # Xvfb + GL runtime libs are required for the headless Unity renderer.
      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y xvfb libgl1 libglib2.0-0

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      # Validate that the secret is set and the Kimi API returns a parseable
      # JSON action.  Cost: ~$0.0001 per run.
      - name: Validate KIMI_API_KEY
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
        run: python scripts/check_kimi_key.py

      # Real smoke test: 5-step territory game driven by Kimi inside a real
      # AI2-THOR scene. Cost: a few cents per run.
      - name: Run territory smoke game (Kimi + AI2-THOR)
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
        run: |
          xvfb-run -a python examples/territory_game.py \
            --model kimi --agents 2 --steps 5 \
            --output-dir output/smoke/territory

      - name: Generate HTML report from smoke replay
        run: python -m roboclaws.core.reporter output/smoke/territory

      # Cooperative counterpart of the territory smoke: same 2-agent, 5-step
      # budget, Kimi-driven, against a real AI2-THOR scene. Bounded at 5 steps
      # to keep total Kimi cost sub-$0.01 per push.
      - name: Run coverage smoke game (Kimi + AI2-THOR)
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
        run: |
          xvfb-run -a python examples/coverage_game.py \
            --model kimi --agents 2 --steps 5 \
            --output-dir output/smoke/coverage

      - name: Generate HTML report from coverage smoke replay
        run: python -m roboclaws.core.reporter output/smoke/coverage

      - name: Upload smoke replay + HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-real-model
          path: output/smoke/**
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Job 3: Optional Railway-hosted OpenClaw integration smoke (issue #40).
  #
  # Complements the in-CI / ephemeral OpenClaw smoke (#39) by proving that our
  # bridge can talk to the user's long-running, persistent Railway deployment.
  # Runs on push to main only and is non-blocking: if Railway is down, the job
  # turns yellow but does NOT fail the overall CI run. The user can read this
  # job's history as a poor-man's Railway uptime check.
  # ---------------------------------------------------------------------------
  openclaw-railway-smoke:
    name: OpenClaw Railway integration (optional)
    runs-on: ubuntu-latest
    needs: lint-and-mock
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # Job-level continue-on-error makes the whole job non-blocking — a Railway
    # outage shows yellow on the run summary, never red.
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      # Share the AI2-THOR Unity build cache with the other jobs (~1 GB).
      - name: Cache AI2-THOR Unity build
        uses: actions/cache@v4
        with:
          path: ~/.ai2thor
          key: ${{ runner.os }}-ai2thor-v1

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y xvfb libgl1 libglib2.0-0

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      # Step-level continue-on-error: skip the game gracefully if Railway is
      # unreachable (cold start, deploy in progress, outright outage). Both
      # this and the job-level guard are needed — the step guard prevents
      # burning Kimi credits on a failed call, the job guard keeps the run
      # green overall.
      - name: Preflight Railway Gateway
        id: preflight
        continue-on-error: true
        env:
          OPENCLAW_RAILWAY_URL: ${{ secrets.OPENCLAW_RAILWAY_URL }}
          OPENCLAW_RAILWAY_TOKEN: ${{ secrets.OPENCLAW_RAILWAY_TOKEN }}
        run: |
          if [ -z "${OPENCLAW_RAILWAY_URL}" ]; then
            echo "::warning::OPENCLAW_RAILWAY_URL secret not set, skipping Railway smoke"
            exit 1
          fi
          # Be generous with retries — Railway free tier can cold-start slowly.
          for i in 1 2 3 4 5; do
            if curl -fsS --max-time 10 \
                -H "Authorization: Bearer ${OPENCLAW_RAILWAY_TOKEN}" \
                "${OPENCLAW_RAILWAY_URL%/}/readyz"; then
              exit 0
            fi
            echo "Railway readyz attempt $i failed, retrying..."
            sleep $((i * 2))
          done
          echo "::warning::Railway Gateway unreachable after 5 attempts, skipping"
          exit 1

      # Minimal smoke (3 steps, 2 agents) — the bigger 5-step run lives in the
      # ephemeral OpenClaw job (#39). This one only proves the live deployment
      # is reachable from our bridge and accepts our payload end-to-end.
      - name: Run 3-step territory game against Railway
        if: steps.preflight.outcome == 'success'
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          OPENCLAW_GATEWAY_URL: ${{ secrets.OPENCLAW_RAILWAY_URL }}
          OPENCLAW_GATEWAY_TOKEN: ${{ secrets.OPENCLAW_RAILWAY_TOKEN }}
        run: |
          xvfb-run -a python examples/territory_game.py \
            --backend openclaw --model kimi --agents 2 --steps 3 \
            --output-dir output/openclaw-railway/territory

      - name: Generate HTML report from Railway smoke replay
        if: steps.preflight.outcome == 'success'
        run: python -m roboclaws.core.reporter output/openclaw-railway/territory

      # Separate artifact name from the ephemeral OpenClaw smoke so the two can
      # be diffed side-by-side when investigating drift.
      - name: Upload Railway smoke replay + HTML report
        if: always() && steps.preflight.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: report-openclaw-railway
          path: output/openclaw-railway/**
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Job 4: Publish the latest reports to GitHub Pages (main only).
  # Combines the mock-engine demo (fast, every-push visualization of the report
  # infrastructure) and the real AI2-THOR + Kimi smoke output (real indoor
  # scene frames) into a single site served from
  # https://<owner>.github.io/<repo>/.
  # ---------------------------------------------------------------------------
  publish-pages:
    name: Publish reports to GitHub Pages
    needs: [lint-and-mock, real-model-smoke]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Need the repo checked out so scripts/write_pages_index.py is available.
      - uses: actions/checkout@v4

      - name: Download mock demo artifact
        uses: actions/download-artifact@v4
        with:
          name: report-mock
          path: site

      - name: Download real-model smoke artifact
        uses: actions/download-artifact@v4
        with:
          name: report-real-model
          path: smoke-src

      # Slot the real-AI2-THOR replays at /smoke/territory/ and /smoke/coverage/
      # and rewrite index.html so the landing page exposes both games alongside
      # the mock demos.
      - name: Assemble Pages site
        run: |
          mkdir -p site/smoke
          cp -r smoke-src/territory site/smoke/territory
          cp -r smoke-src/coverage site/smoke/coverage
          python scripts/write_pages_index.py site --include-smoke

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
