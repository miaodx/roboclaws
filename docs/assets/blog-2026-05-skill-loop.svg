<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520"
     font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
    <marker id="arrow2-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow2-yellow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706"/>
    </marker>
  </defs>

  <rect width="760" height="520" fill="white"/>

  <!-- title -->
  <text x="380" y="32" text-anchor="middle" font-size="16" font-weight="600" fill="#1f2937">harness/ 自我改进循环 — 一份会自己更新的 SKILL.md</text>

  <!-- Step 1: harness fires -->
  <rect x="50" y="70" width="160" height="58" fill="#f9fafb" stroke="#6b7280" stroke-width="1.5" rx="6"/>
  <text x="130" y="92" text-anchor="middle" font-size="12" font-weight="600" fill="#1f2937">① just harness::run</text>
  <text x="130" y="108" text-anchor="middle" font-size="10" fill="#6b7280">tmux 起 fresh agent</text>
  <text x="130" y="121" text-anchor="middle" font-size="10" fill="#6b7280">photo-living-room 任务</text>

  <!-- Step 2: Claude Code drives sim -->
  <rect x="280" y="70" width="200" height="58" fill="#dbeafe" stroke="#2563eb" stroke-width="2" rx="6"/>
  <text x="380" y="92" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">② Claude Code via MCP</text>
  <text x="380" y="108" text-anchor="middle" font-size="10" fill="#2563eb">observe / move / goto / done</text>
  <text x="380" y="121" text-anchor="middle" font-size="10" fill="#2563eb">读 SKILL.md, 跑任务</text>

  <!-- Step 3: trace.jsonl -->
  <rect x="550" y="70" width="170" height="58" fill="#f9fafb" stroke="#6b7280" stroke-width="1.5" rx="6"/>
  <text x="635" y="92" text-anchor="middle" font-size="12" font-weight="600" fill="#1f2937">③ trace.jsonl</text>
  <text x="635" y="108" text-anchor="middle" font-size="10" fill="#6b7280">10 个 goto 全 collision</text>
  <text x="635" y="121" text-anchor="middle" font-size="10" fill="#6b7280">"target.bbox.y" 用错了</text>

  <!-- arrows step 1 → 2 → 3 -->
  <line x1="210" y1="99" x2="278" y2="99" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="480" y1="99" x2="548" y2="99" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- Step 4: agent reads trace + edits SKILL.md -->
  <rect x="280" y="170" width="200" height="58" fill="#dbeafe" stroke="#2563eb" stroke-width="2" rx="6"/>
  <text x="380" y="192" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">④ 读 trace · 改 SKILL.md</text>
  <text x="380" y="208" text-anchor="middle" font-size="10" fill="#2563eb">"先 scene_objects 再 goto"</text>
  <text x="380" y="221" text-anchor="middle" font-size="10" fill="#2563eb">"y 用 agent.y, 不是 bbox.y"</text>

  <!-- arrow from step 3 down to step 4 -->
  <path d="M 635 128 L 635 200 L 482 200" stroke="#6b7280" stroke-width="1.5" fill="none" marker-end="url(#arrow2)"/>

  <!-- updated SKILL.md (the star) -->
  <rect x="280" y="270" width="200" height="80" fill="#fef3c7" stroke="#d97706" stroke-width="2.4" rx="8"/>
  <text x="380" y="294" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">📄 SKILL.md (updated)</text>
  <text x="380" y="312" text-anchor="middle" font-size="10" fill="#92400e">photo protocol v2</text>
  <text x="380" y="326" text-anchor="middle" font-size="10" fill="#92400e">+ axes &amp; yaw lock-down</text>
  <text x="380" y="340" text-anchor="middle" font-size="10" fill="#92400e">+ goto y-coordinate fix</text>

  <!-- arrow from step 4 to updated SKILL.md -->
  <line x1="380" y1="228" x2="380" y2="266" stroke="#d97706" stroke-width="1.6" marker-end="url(#arrow2-yellow)"/>

  <!-- branch out: SKILL.md 被三个去处加载 -->
  <!-- next harness run -->
  <rect x="50" y="390" width="180" height="60" fill="#f9fafb" stroke="#6b7280" stroke-width="1.5" rx="6"/>
  <text x="140" y="413" text-anchor="middle" font-size="12" font-weight="600" fill="#1f2937">⑤a 下次 harness 跑</text>
  <text x="140" y="429" text-anchor="middle" font-size="10" fill="#6b7280">37 calls / 9-of-9 / 3.8 min</text>
  <text x="140" y="442" text-anchor="middle" font-size="10" fill="#6b7280">3.4× 提升 vs baseline</text>

  <!-- Mode 2 OpenClaw -->
  <rect x="290" y="390" width="180" height="60" fill="#f9fafb" stroke="#6b7280" stroke-width="1.5" rx="6"/>
  <text x="380" y="413" text-anchor="middle" font-size="12" font-weight="600" fill="#1f2937">⑤b Mode 2 OpenClaw</text>
  <text x="380" y="429" text-anchor="middle" font-size="10" fill="#6b7280">同一 skill 直接受益</text>
  <text x="380" y="442" text-anchor="middle" font-size="10" fill="#6b7280">研究员看到 episode 变稳</text>

  <!-- Mode 4 Railway -->
  <rect x="530" y="390" width="180" height="60" fill="#f9fafb" stroke="#6b7280" stroke-width="1.5" rx="6"/>
  <text x="620" y="413" text-anchor="middle" font-size="12" font-weight="600" fill="#1f2937">⑤c Mode 4 Railway</text>
  <text x="620" y="429" text-anchor="middle" font-size="10" fill="#6b7280">对外 demo 复利</text>
  <text x="620" y="442" text-anchor="middle" font-size="10" fill="#6b7280">单容器内统一更新</text>

  <!-- arrows from updated SKILL.md down to ⑤a/b/c -->
  <line x1="320" y1="350" x2="170" y2="386" stroke="#d97706" stroke-width="1.4" stroke-dasharray="4 4" marker-end="url(#arrow2-yellow)"/>
  <line x1="380" y1="350" x2="380" y2="386" stroke="#d97706" stroke-width="1.4" stroke-dasharray="4 4" marker-end="url(#arrow2-yellow)"/>
  <line x1="440" y1="350" x2="590" y2="386" stroke="#d97706" stroke-width="1.4" stroke-dasharray="4 4" marker-end="url(#arrow2-yellow)"/>

  <!-- caption -->
  <text x="380" y="488" text-anchor="middle" font-size="11" fill="#6b7280" font-style="italic">SKILL.md 是被多个 mode 共同加载的可执行说明书 — 优化一处,全栈受益</text>
</svg>
