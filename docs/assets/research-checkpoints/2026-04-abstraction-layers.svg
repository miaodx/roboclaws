<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Roboclaws April 2026 checkpoint abstraction layers</title>
  <desc id="desc">A layered view showing raw model APIs, agent kernels, harnesses, assistant platforms, and the roboclaws simulation core.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#f7fbff"/><stop offset="0.55" stop-color="#eef7f2"/><stop offset="1" stop-color="#fff8ea"/></linearGradient>
    <linearGradient id="current" x1="0" x2="1"><stop offset="0" stop-color="#0b5f79"/><stop offset="1" stop-color="#1d9a8a"/></linearGradient>
    <filter id="shadow" x="-8%" y="-12%" width="116%" height="130%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#17323c" flood-opacity="0.16"/></filter>
    <style>
      .title{font:800 34px "Aptos Display","Noto Sans CJK SC","Segoe UI",sans-serif;fill:#13313d}.subtitle{font:500 18px "Aptos","Noto Sans CJK SC","Segoe UI",sans-serif;fill:#4c6570}.layer-label{font:800 22px "Aptos Display","Noto Sans CJK SC","Segoe UI",sans-serif;fill:#16323d}.layer-copy{font:500 16px "Aptos","Noto Sans CJK SC","Segoe UI",sans-serif;fill:#415d67}.tag{font:800 13px "Aptos","Noto Sans CJK SC","Segoe UI",sans-serif;letter-spacing:.08em;fill:#fff}.small{font:600 14px "Aptos","Noto Sans CJK SC","Segoe UI",sans-serif;fill:#506974}.callout{font:800 18px "Aptos","Noto Sans CJK SC","Segoe UI",sans-serif;fill:#fff}
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/><circle cx="1120" cy="104" r="210" fill="#d7efe8" opacity=".55"/><circle cx="100" cy="648" r="260" fill="#f8dfae" opacity=".42"/>
  <text x="64" y="64" class="title">April 2026 diff view: abstraction layers</text><text x="64" y="96" class="subtitle">Use this view when deciding whether work belongs in model API glue, an agent kernel, a harness, or a complete assistant platform.</text>
  <g filter="url(#shadow)"><rect x="64" y="134" width="828" height="92" rx="24" fill="#fff"/><rect x="64" y="246" width="828" height="92" rx="24" fill="#fff"/><rect x="64" y="358" width="828" height="92" rx="24" fill="#fff"/><rect x="64" y="470" width="828" height="92" rx="24" fill="#fff"/><rect x="64" y="582" width="828" height="76" rx="24" fill="#fff"/></g>
  <g><rect x="90" y="158" width="92" height="44" rx="22" fill="#d85a3a"/><text x="136" y="185" text-anchor="middle" class="tag">L3</text><text x="214" y="172" class="layer-label">Assistant platform</text><text x="214" y="200" class="layer-copy">OpenClaw Gateway, Control UI, session auth, hosted appliance behavior.</text></g>
  <g><rect x="90" y="270" width="92" height="44" rx="22" fill="#d0921f"/><text x="136" y="297" text-anchor="middle" class="tag">L2.5</text><text x="214" y="284" class="layer-label">Harness engineering</text><text x="214" y="312" class="layer-copy">Codex / Claude workflows, harness/, scoring, logbooks, tmux, handoffs.</text></g>
  <g><rect x="90" y="382" width="92" height="44" rx="22" fill="#498a5e"/><text x="136" y="409" text-anchor="middle" class="tag">L2</text><text x="214" y="396" class="layer-label">Agent SDK / kernel</text><text x="214" y="424" class="layer-copy">Smolagents, Claude Agent SDK, OpenAI Agents SDK, pi-mono style control loops.</text></g>
  <g><rect x="90" y="494" width="92" height="44" rx="22" fill="#416fb5"/><text x="136" y="521" text-anchor="middle" class="tag">L1</text><text x="214" y="508" class="layer-label">Raw model providers</text><text x="214" y="536" class="layer-copy">Kimi, MiMo, OpenAI, Anthropic, NVIDIA NIM: prompts in, model text out.</text></g>
  <g><rect x="90" y="600" width="92" height="40" rx="20" fill="#213746"/><text x="136" y="625" text-anchor="middle" class="tag">SIM</text><text x="214" y="615" class="layer-label">Roboclaws core</text><text x="214" y="641" class="layer-copy">MultiAgentEngine + AI2-THOR + replay artifacts + MCP observe / move / done.</text></g>
  <g filter="url(#shadow)"><rect x="942" y="214" width="270" height="340" rx="32" fill="url(#current)"/></g><text x="1077" y="260" text-anchor="middle" class="callout">Where roboclaws is active</text>
  <rect x="978" y="292" width="198" height="48" rx="24" fill="#fff" opacity=".94"/><text x="1077" y="322" text-anchor="middle" class="small">Mode 2: OpenClaw L3</text><rect x="978" y="360" width="198" height="48" rx="24" fill="#fff" opacity=".94"/><text x="1077" y="390" text-anchor="middle" class="small">Mode 3: harness L2.5</text><rect x="978" y="428" width="198" height="48" rx="24" fill="#fff" opacity=".94"/><text x="1077" y="458" text-anchor="middle" class="small">MCP contract boundary</text><text x="1077" y="510" text-anchor="middle" class="callout">Build below the line,</text><text x="1077" y="536" text-anchor="middle" class="callout">compare above the line.</text>
  <path d="M900 316 C930 316 930 316 960 316" fill="none" stroke="#0b5f79" stroke-width="5" stroke-linecap="round"/><path d="M900 604 C930 604 930 452 960 452" fill="none" stroke="#0b5f79" stroke-width="5" stroke-linecap="round"/>
</svg>
