<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Roboclaws April 2026 checkpoint deployment modes</title>
  <desc id="desc">Four operating modes compared by driver, mediation layer, simulation core, and artifacts.</desc>
  <defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#f4f8ff"/><stop offset="0.52" stop-color="#f8fbef"/><stop offset="1" stop-color="#fff2ec"/></linearGradient><linearGradient id="core" x1="0" x2="1"><stop offset="0" stop-color="#16384a"/><stop offset="1" stop-color="#126f78"/></linearGradient><filter id="shadow" x="-9%" y="-12%" width="118%" height="130%"><feDropShadow dx="0" dy="12" stdDeviation="13" flood-color="#1f343d" flood-opacity="0.15"/></filter><style>.title{font:800 34px "Aptos Display","Noto Sans CJK SC","Segoe UI",sans-serif;fill:#162f3b}.subtitle{font:500 18px "Aptos","Noto Sans CJK SC","Segoe UI",sans-serif;fill:#52666e}.mode{font:800 20px "Aptos Display","Noto Sans CJK SC","Segoe UI",sans-serif;fill:#172f3a}.copy{font:500 14px "Aptos","Noto Sans CJK SC","Segoe UI",sans-serif;fill:#506972}.pill{font:800 13px "Aptos","Noto Sans CJK SC","Segoe UI",sans-serif;fill:#fff;letter-spacing:.04em}.core{font:800 22px "Aptos Display","Noto Sans CJK SC","Segoe UI",sans-serif;fill:#fff}.artifact{font:700 14px "Aptos","Noto Sans CJK SC","Segoe UI",sans-serif;fill:#25414b}</style></defs>
  <rect width="1280" height="720" fill="url(#bg)"/><text x="64" y="64" class="title">April 2026 diff view: four operating modes</text><text x="64" y="96" class="subtitle">Use this view when choosing which path to run: direct VLM, OpenClaw Gateway, coding-agent MCP, or Railway appliance.</text>
  <g filter="url(#shadow)"><rect x="66" y="144" width="264" height="312" rx="28" fill="#fff"/><rect x="362" y="144" width="264" height="312" rx="28" fill="#fff"/><rect x="658" y="144" width="264" height="312" rx="28" fill="#fff"/><rect x="954" y="144" width="264" height="312" rx="28" fill="#fff"/></g>
  <g><rect x="94" y="174" width="96" height="34" rx="17" fill="#416fb5"/><text x="142" y="196" text-anchor="middle" class="pill">MODE 1</text><text x="94" y="240" class="mode">Direct VLM games</text><text x="94" y="274" class="copy">examples/territory_game.py</text><text x="94" y="296" class="copy">examples/coverage_game.py</text><rect x="94" y="326" width="208" height="54" rx="18" fill="#eef4ff"/><text x="198" y="358" text-anchor="middle" class="artifact">VLMProvider drives turns</text></g>
  <g><rect x="390" y="174" width="96" height="34" rx="17" fill="#d85a3a"/><text x="438" y="196" text-anchor="middle" class="pill">MODE 2</text><text x="390" y="240" class="mode">OpenClaw Gateway</text><text x="390" y="274" class="copy">just openclaw::run nav</text><text x="390" y="296" class="copy">just chat::run</text><rect x="390" y="326" width="208" height="54" rx="18" fill="#fff0ea"/><text x="494" y="358" text-anchor="middle" class="artifact">Gateway mediates sessions</text></g>
  <g><rect x="686" y="174" width="96" height="34" rx="17" fill="#0e8a78"/><text x="734" y="196" text-anchor="middle" class="pill">MODE 3</text><text x="686" y="240" class="mode">Coding agent via MCP</text><text x="686" y="274" class="copy">coding_agent_nav_server.py</text><text x="686" y="296" class="copy">Codex / Claude calls tools</text><rect x="686" y="326" width="208" height="54" rx="18" fill="#e9f8f4"/><text x="790" y="358" text-anchor="middle" class="artifact">observe / move / done</text></g>
  <g><rect x="982" y="174" width="96" height="34" rx="17" fill="#8a6f2b"/><text x="1030" y="196" text-anchor="middle" class="pill">MODE 4</text><text x="982" y="240" class="mode">Railway appliance</text><text x="982" y="274" class="copy">Dockerfile.railway</text><text x="982" y="296" class="copy">nginx + reset + Gateway</text><rect x="982" y="326" width="208" height="54" rx="18" fill="#f6f0ff"/><text x="1086" y="358" text-anchor="middle" class="artifact">hosted demo surface</text></g>
  <g stroke="#a8b7bc" stroke-width="4" stroke-linecap="round" fill="none"><path d="M198 456 V500"/><path d="M494 456 V500"/><path d="M790 456 V500"/><path d="M1086 456 V500"/></g><g fill="#a8b7bc"><path d="M198 500 l-8 -12 h16z"/><path d="M494 500 l-8 -12 h16z"/><path d="M790 500 l-8 -12 h16z"/><path d="M1086 500 l-8 -12 h16z"/></g>
  <g filter="url(#shadow)"><rect x="168" y="506" width="944" height="84" rx="32" fill="url(#core)"/></g><text x="640" y="542" text-anchor="middle" class="core">Shared core: MultiAgentEngine + AI2-THOR + replay/report artifacts</text><text x="640" y="572" text-anchor="middle" class="pill">same simulation contract, different driver and deployment envelope</text><rect x="256" y="624" width="768" height="42" rx="21" fill="#fff" opacity=".88"/><text x="640" y="651" text-anchor="middle" class="artifact">Decision rule: validate behavior locally in Mode 1/3, package demos through Mode 2/4 only after the artifact contract is stable.</text>
</svg>
