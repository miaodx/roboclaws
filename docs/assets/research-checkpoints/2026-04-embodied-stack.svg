<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Roboclaws April 2026 checkpoint embodied stack</title>
  <desc id="desc">A robotics-specific embodied stack showing reasoner, skill or VLA layer, controller, simulation substrate, and the next substrate migration options.</desc>
  <defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#f6fbff"/><stop offset="0.5" stop-color="#f8f6ec"/><stop offset="1" stop-color="#eff8f1"/></linearGradient><linearGradient id="future" x1="0" x2="1"><stop offset="0" stop-color="#1a6f80"/><stop offset="1" stop-color="#47a46a"/></linearGradient><filter id="shadow" x="-9%" y="-12%" width="118%" height="132%"><feDropShadow dx="0" dy="12" stdDeviation="13" flood-color="#1f343d" flood-opacity="0.16"/></filter><style>.title{font:800 34px "Aptos Display","Noto Sans CJK SC","Segoe UI",sans-serif;fill:#162f3b}.subtitle{font:500 18px "Aptos","Noto Sans CJK SC","Segoe UI",sans-serif;fill:#52666e}.layer{font:800 22px "Aptos Display","Noto Sans CJK SC","Segoe UI",sans-serif;fill:#172f39}.copy{font:500 15px "Aptos","Noto Sans CJK SC","Segoe UI",sans-serif;fill:#506972}.tag{font:800 13px "Aptos","Noto Sans CJK SC","Segoe UI",sans-serif;fill:#fff;letter-spacing:.06em}.future{font:800 19px "Aptos Display","Noto Sans CJK SC","Segoe UI",sans-serif;fill:#fff}.small{font:600 13px "Aptos","Noto Sans CJK SC","Segoe UI",sans-serif;fill:#fff;opacity:.9}</style></defs>
  <rect width="1280" height="720" fill="url(#bg)"/><circle cx="1080" cy="610" r="250" fill="#d9efe0" opacity=".72"/><circle cx="86" cy="120" r="180" fill="#dcecff" opacity=".72"/><text x="64" y="64" class="title">April 2026 diff view: embodied agent stack</text><text x="64" y="96" class="subtitle">Use this view when separating high-level reasoning from skills, controllers, and the simulation substrate.</text>
  <g filter="url(#shadow)"><rect x="80" y="148" width="718" height="88" rx="26" fill="#fff"/><rect x="80" y="258" width="718" height="88" rx="26" fill="#fff"/><rect x="80" y="368" width="718" height="88" rx="26" fill="#fff"/><rect x="80" y="478" width="718" height="88" rx="26" fill="#fff"/></g>
  <g><rect x="108" y="171" width="92" height="42" rx="21" fill="#b85f37"/><text x="154" y="197" text-anchor="middle" class="tag">L-HI</text><text x="232" y="184" class="layer">Reasoner</text><text x="232" y="212" class="copy">Kimi, MiMo, Claude, GPT, Smolagents CodeAgent, Codex / Claude Code operator.</text></g>
  <g><rect x="108" y="281" width="92" height="42" rx="21" fill="#586bb6"/><text x="154" y="307" text-anchor="middle" class="tag">L-MID</text><text x="232" y="294" class="layer">Skill / action expert</text><text x="232" y="322" class="copy">Today: navigation skill and tool policy. Later: VLA expert such as GR00T or π₀.₅.</text></g>
  <g><rect x="108" y="391" width="92" height="42" rx="21" fill="#0e8a78"/><text x="154" y="417" text-anchor="middle" class="tag">L-LO</text><text x="232" y="404" class="layer">Controller</text><text x="232" y="432" class="copy">MCP move, AI2-THOR discrete actions, future continuous controllers.</text></g>
  <g><rect x="108" y="501" width="92" height="42" rx="21" fill="#31546d"/><text x="154" y="527" text-anchor="middle" class="tag">L-SIM</text><text x="232" y="514" class="layer">Substrate</text><text x="232" y="542" class="copy">Today: iTHOR scenes. Next spike: MolmoSpaces navigation and manipulation readiness.</text></g>
  <g stroke="#adc0c5" stroke-width="4" stroke-linecap="round" fill="none"><path d="M438 236 V256"/><path d="M438 346 V366"/><path d="M438 456 V476"/></g><g fill="#adc0c5"><path d="M438 256 l-8 -12 h16z"/><path d="M438 366 l-8 -12 h16z"/><path d="M438 476 l-8 -12 h16z"/></g>
  <g filter="url(#shadow)"><rect x="862" y="164" width="314" height="392" rx="34" fill="url(#future)"/></g><text x="1019" y="214" text-anchor="middle" class="future">Next substrate decision</text><text x="1019" y="248" text-anchor="middle" class="small">Do not pick the VLA first.</text><text x="1019" y="272" text-anchor="middle" class="small">Pick the substrate and task shape first.</text><rect x="902" y="316" width="234" height="54" rx="20" fill="#fff" opacity=".94"/><text x="1019" y="349" text-anchor="middle" class="copy">MolmoSpaces spike</text><rect x="902" y="390" width="234" height="54" rx="20" fill="#fff" opacity=".94"/><text x="1019" y="423" text-anchor="middle" class="copy">Territory / coverage fit</text><rect x="902" y="464" width="234" height="54" rx="20" fill="#fff" opacity=".94"/><text x="1019" y="497" text-anchor="middle" class="copy">LeRobotDataset export</text><path d="M800 522 C830 522 830 522 860 522" fill="none" stroke="#1a6f80" stroke-width="5" stroke-linecap="round"/>
</svg>
