  <g><rect x="466" y="190" width="120" height="34" rx="17" fill="#b85f37"/><text x="526" y="212" text-anchor="middle" class="lane">PLANNING</text><text x="526" y="252" text-anchor="middle" class="node-title">model driver</text><text x="526" y="280" text-anchor="middle" class="node-copy">VLM JSON</text><text x="526" y="302" text-anchor="middle" class="node-copy">CodeAgent</text><text x="526" y="324" text-anchor="middle" class="node-copy">harness judge</text></g>
