<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Roboclaws April 2026 checkpoint responsibility flow</title>
  <desc id="desc">A responsibility-oriented flow from perception to memory, planning, skills, actions, communication, and evidence.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#fbf7ef"/><stop offset="0.48" stop-color="#f4fbf7"/><stop offset="1" stop-color="#edf6ff"/></linearGradient>
    <filter id="shadow" x="-10%" y="-14%" width="120%" height="132%"><feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#2d3c43" flood-opacity="0.14"/></filter>
    <style>.title{font:800 34px "Aptos Display","Noto Sans CJK SC","Segoe UI",sans-serif;fill:#17313d}.subtitle{font:500 18px "Aptos","Noto Sans CJK SC","Segoe UI",sans-serif;fill:#52646c}.node-title{font:800 18px "Aptos Display","Noto Sans CJK SC","Segoe UI",sans-serif;fill:#172f39}.node-copy{font:500 14px "Aptos","Noto Sans CJK SC","Segoe UI",sans-serif;fill:#536972}.lane{font:800 16px "Aptos Display","Noto Sans CJK SC","Segoe UI",sans-serif;fill:#fff;letter-spacing:.04em}.evidence{font:700 15px "Aptos","Noto Sans CJK SC","Segoe UI",sans-serif;fill:#1d3a45}.tiny{font:600 12px "Aptos","Noto Sans CJK SC","Segoe UI",sans-serif;fill:#5d737b}</style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/><path d="M-90 560 C180 440 290 760 570 604 C850 448 1040 520 1370 388" fill="none" stroke="#d8eee4" stroke-width="98" opacity=".72"/>
  <text x="64" y="64" class="title">April 2026 diff view: responsibilities</text><text x="64" y="96" class="subtitle">Use this view when deciding which module owns a behavior: view rendering, memory, planning, action, communication, or artifact evidence.</text>
