  <g><rect x="82" y="190" width="120" height="34" rx="17" fill="#2d7d93"/><text x="142" y="212" text-anchor="middle" class="lane">PERCEPTION</text><text x="142" y="252" text-anchor="middle" class="node-title">views.py</text><text x="142" y="280" text-anchor="middle" class="node-copy">FPV</text><text x="142" y="302" text-anchor="middle" class="node-copy">map-v2</text><text x="142" y="324" text-anchor="middle" class="node-copy">chase cam</text></g>
