<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Backend variants as robot bodies</title>
  <desc id="desc">A matrix showing one skill loop working across AI2-THOR, MolmoSpaces, Isaac, and real robot backends.</desc>
  <defs>
    <style>
      .bg { fill: #f7f4ef; }
      .ink { fill: #17212b; }
      .muted { fill: #66717d; }
      .head { fill: #dff4ec; stroke: #24313f; stroke-width: 2.5; }
      .cell { fill: #ffffff; stroke: #24313f; stroke-width: 2; }
      .body { font: 600 20px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { font: 500 16px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { font: 700 30px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font: 600 17px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="640"/>
  <text class="title ink" x="70" y="72">Backend is the body. The skill loop is the brain.</text>
  <text class="small muted" x="70" y="106">The agent-facing shape should survive simulator and hardware changes.</text>

  <rect class="head" x="125" y="150" width="950" height="74" rx="16"/>
  <text class="body ink" x="382" y="196">Same task / skill / MCP / report boundary</text>

  <g transform="translate(125 275)">
    <rect class="cell" x="0" y="0" width="220" height="210" rx="14"/>
    <text class="body ink" x="67" y="48">AI2-THOR</text>
    <text class="small muted" x="42" y="92">navigation</text>
    <text class="small muted" x="57" y="124">coverage</text>
    <text class="small muted" x="66" y="156">photos</text>

    <rect class="cell" x="245" y="0" width="220" height="210" rx="14"/>
    <text class="body ink" x="289" y="48">MolmoSpaces</text>
    <text class="small muted" x="292" y="92">household cleanup</text>
    <text class="small muted" x="314" y="124">runtime maps</text>
    <text class="small muted" x="322" y="156">rehearsal</text>

    <rect class="cell" x="490" y="0" width="220" height="210" rx="14"/>
    <text class="body ink" x="566" y="48">Isaac</text>
    <text class="small muted" x="552" y="92">USD scenes</text>
    <text class="small muted" x="536" y="124">segmentation</text>
    <text class="small muted" x="527" y="156">provenance</text>

    <rect class="cell" x="735" y="0" width="220" height="210" rx="14"/>
    <text class="body ink" x="800" y="48">Real robot</text>
    <text class="small muted" x="782" y="92">operator gates</text>
    <text class="small muted" x="812" y="124">Nav2</text>
    <text class="small muted" x="781" y="156">blocked caps</text>
  </g>

  <text class="mono ink" x="316" y="558">skill should depend on capability profile, not private simulator APIs</text>
</svg>
