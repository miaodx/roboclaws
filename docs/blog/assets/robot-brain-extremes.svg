<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Two bad extremes and the skill loop middle path</title>
  <desc id="desc">A three-column comparison between a thin LLM loop, a heavy agent stack, and Roboclaws' skill loop first approach.</desc>
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,5 L0,10 Z" fill="#2e3640"/>
    </marker>
    <style>
      .bg { fill: #f7f4ef; }
      .ink { fill: #1f2933; }
      .muted { fill: #5d6975; }
      .line { stroke: #2e3640; stroke-width: 2.5; fill: none; }
      .arrow { stroke: #2e3640; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .soft { fill: #fffaf2; stroke: #2e3640; stroke-width: 2.5; }
      .bad { fill: #ffe8dd; stroke: #2e3640; stroke-width: 2.5; }
      .good { fill: #dff4ec; stroke: #2e3640; stroke-width: 2.5; }
      .accent { fill: #2a9d8f; }
      .warn { fill: #e76f51; }
      .title { font: 700 36px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .h { font: 700 25px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .body { font: 500 19px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { font: 500 16px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font: 600 17px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="640"/>
  <text class="title ink" x="70" y="72">Two extremes are tempting. The useful cut is in the middle.</text>
  <text class="body muted" x="70" y="110">Robot intelligence should not disappear into a prompt or into a giant runtime.</text>

  <rect class="bad" x="70" y="165" width="310" height="365" rx="18"/>
  <circle class="warn" cx="112" cy="208" r="16"/>
  <text class="h ink" x="140" y="216">Too Thin</text>
  <text class="mono ink" x="112" y="267">script + LLM loop</text>
  <path class="line" d="M125 306h198M125 346h155M125 386h183" opacity="0.45"/>
  <text class="body ink" x="112" y="440">Fast demo.</text>
  <text class="body ink" x="112" y="472">Every complex task</text>
  <text class="body ink" x="112" y="504">starts over.</text>

  <rect class="bad" x="445" y="165" width="310" height="365" rx="18"/>
  <circle class="warn" cx="487" cy="208" r="16"/>
  <text class="h ink" x="515" y="216">Too Heavy</text>
  <text class="mono ink" x="487" y="267">agent framework</text>
  <rect class="soft" x="490" y="300" width="220" height="44" rx="9"/>
  <rect class="soft" x="505" y="360" width="190" height="44" rx="9"/>
  <rect class="soft" x="522" y="420" width="156" height="44" rx="9"/>
  <text class="small muted" x="528" y="328">planner / memory</text>
  <text class="small muted" x="543" y="388">graph / router</text>
  <text class="small muted" x="557" y="448">runtime</text>
  <text class="body ink" x="487" y="504">Strategy gets buried.</text>

  <rect class="good" x="820" y="165" width="310" height="365" rx="18"/>
  <circle class="accent" cx="862" cy="208" r="16"/>
  <text class="h ink" x="890" y="216">Skill Loop First</text>
  <text class="mono ink" x="862" y="267">skill -> tools -> report</text>
  <path class="arrow" d="M930 335c45-42 113-5 113 45"/>
  <path class="arrow" d="M1043 380c0 58-65 93-112 48"/>
  <path class="arrow" d="M931 428c-26-25-31-63-15-94"/>
  <text class="small ink" x="881" y="326">run</text>
  <text class="small ink" x="1029" y="385">trace</text>
  <text class="small ink" x="889" y="449">edit</text>
  <text class="body ink" x="862" y="504">Experience has a home.</text>

  <path class="arrow" d="M390 347h43"/>
  <path class="arrow" d="M765 347h43"/>
</svg>
