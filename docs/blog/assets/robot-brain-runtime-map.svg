<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="690" viewBox="0 0 1200 690" role="img" aria-labelledby="title desc">
  <title id="title">Minimal map to runtime metric map</title>
  <desc id="desc">A mock map showing minimal navigation evidence becoming runtime semantic anchors through public observations.</desc>
  <defs>
    <style>
      .bg { fill: #f8f6f0; }
      .ink { fill: #17212b; }
      .muted { fill: #687482; }
      .panel { fill: #ffffff; stroke: #24313f; stroke-width: 2.5; }
      .grid { stroke: #d9ddd8; stroke-width: 1; }
      .wall { fill: #2d3742; }
      .free { fill: #f4f7fb; }
      .cand { fill: #ffe6a8; stroke: #24313f; stroke-width: 1.8; }
      .obj { fill: #2a9d8f; stroke: #24313f; stroke-width: 2; }
      .rec { fill: #e76f51; stroke: #24313f; stroke-width: 2; }
      .bot { fill: #5b8def; stroke: #24313f; stroke-width: 2; }
      .line { stroke: #24313f; stroke-width: 2.5; fill: none; }
      .title { font: 700 30px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .h { font: 700 26px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { font: 500 16px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font: 600 17px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="690"/>
  <text class="title ink" x="70" y="72">A skill needs world memory, not just the current frame.</text>
  <text class="small muted" x="70" y="106">Start minimal. Build runtime semantic evidence from public observations.</text>

  <rect class="panel" x="70" y="155" width="470" height="430" rx="18"/>
  <text class="h ink" x="110" y="205">Minimal navigation map</text>
  <g transform="translate(120 245)">
    <rect class="free" x="0" y="0" width="340" height="260"/>
    <g>
      <path class="grid" d="M34 0v260M68 0v260M102 0v260M136 0v260M170 0v260M204 0v260M238 0v260M272 0v260M306 0v260"/>
      <path class="grid" d="M0 34h340M0 68h340M0 102h340M0 136h340M0 170h340M0 204h340M0 238h340"/>
    </g>
    <rect class="wall" x="0" y="0" width="340" height="18"/>
    <rect class="wall" x="0" y="242" width="340" height="18"/>
    <rect class="wall" x="0" y="0" width="18" height="260"/>
    <rect class="wall" x="322" y="0" width="18" height="260"/>
    <rect class="wall" x="170" y="18" width="18" height="116"/>
    <circle class="cand" cx="85" cy="78" r="13"/>
    <circle class="cand" cx="255" cy="84" r="13"/>
    <circle class="cand" cx="102" cy="196" r="13"/>
    <circle class="bot" cx="221" cy="184" r="15"/>
    <path class="line" d="M221 184l23-16"/>
  </g>
  <text class="mono muted" x="125" y="550">free-space / pose / exploration candidates</text>

  <path class="line" d="M560 370h82"/>
  <path class="line" d="M636 358l18 12-18 12"/>

  <rect class="panel" x="660" y="155" width="470" height="430" rx="18"/>
  <text class="h ink" x="700" y="205">Runtime Metric Map</text>
  <g transform="translate(710 245)">
    <rect class="free" x="0" y="0" width="340" height="260"/>
    <g>
      <path class="grid" d="M34 0v260M68 0v260M102 0v260M136 0v260M170 0v260M204 0v260M238 0v260M272 0v260M306 0v260"/>
      <path class="grid" d="M0 34h340M0 68h340M0 102h340M0 136h340M0 170h340M0 204h340M0 238h340"/>
    </g>
    <rect class="wall" x="0" y="0" width="340" height="18"/>
    <rect class="wall" x="0" y="242" width="340" height="18"/>
    <rect class="wall" x="0" y="0" width="18" height="260"/>
    <rect class="wall" x="322" y="0" width="18" height="260"/>
    <rect class="wall" x="170" y="18" width="18" height="116"/>
    <circle class="obj" cx="82" cy="82" r="14"/>
    <text class="small ink" x="101" y="88">mug?</text>
    <circle class="rec" cx="257" cy="86" r="14"/>
    <text class="small ink" x="276" y="92">sink</text>
    <circle class="obj" cx="104" cy="198" r="14"/>
    <text class="small ink" x="124" y="204">bowl</text>
    <circle class="bot" cx="221" cy="184" r="15"/>
    <path class="line" d="M221 184l23-16"/>
  </g>
  <text class="mono muted" x="715" y="550">objects / receptacles / evidence anchors</text>
</svg>
