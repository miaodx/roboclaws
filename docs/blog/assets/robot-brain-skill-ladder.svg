<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Roboclaws skill-first architecture loop</title>
  <desc id="desc">A diagram showing a skill-first robot architecture. A user goal becomes a runnable task, which selects an agent skill. The skill is constrained by a capability profile, calls bounded MCP tools, runs through a backend, and produces trace, runtime map, and report evidence that feeds back into the skill.</desc>
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="10" refY="5.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,5.5 L0,11 Z" fill="#263443"/>
    </marker>
    <style>
      .bg { fill: #fbfaf6; }
      .ink { fill: #17212b; }
      .muted { fill: #65717d; }
      .box { fill: #ffffff; stroke: #263443; stroke-width: 2.5; }
      .skill { fill: #dff4ec; stroke: #263443; stroke-width: 3; }
      .evidence { fill: #fff0c7; stroke: #263443; stroke-width: 2.5; }
      .profile { fill: #eef6ff; stroke: #263443; stroke-width: 2.3; }
      .line { stroke: #263443; stroke-width: 2.6; fill: none; marker-end: url(#arrow); }
      .softline { stroke: #65717d; stroke-width: 2.3; fill: none; stroke-dasharray: 7 7; }
      .title { font: 700 30px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .body { font: 600 21px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { font: 500 16px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font: 600 16px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="680"/>
  <text class="title ink" x="70" y="72">Where does robot intelligence live?</text>
  <text class="small muted" x="70" y="106">Strategy lives in the skill. Reports are evidence that improves it, not another robot capability layer.</text>

  <rect class="box" x="100" y="180" width="210" height="70" rx="16"/>
  <text class="body ink" x="141" y="212">Open goal</text>
  <text class="small muted" x="141" y="233">what the user wants</text>

  <rect class="box" x="380" y="180" width="220" height="70" rx="16"/>
  <text class="body ink" x="428" y="212">Runnable task</text>
  <text class="small muted" x="446" y="233">what to run</text>

  <rect class="skill" x="685" y="170" width="240" height="90" rx="18"/>
  <text class="body ink" x="749" y="209">Agent skill</text>
  <text class="small muted" x="736" y="232">editable strategy</text>

  <rect class="profile" x="940" y="315" width="210" height="66" rx="15"/>
  <text class="body ink" x="974" y="345">Capability profile</text>
  <text class="small muted" x="984" y="367">allowed abilities</text>

  <rect class="box" x="685" y="350" width="240" height="78" rx="16"/>
  <text class="body ink" x="729" y="382">MCP tools</text>
  <text class="small muted" x="720" y="405">observe / move / pick</text>

  <rect class="box" x="685" y="495" width="240" height="72" rx="16"/>
  <text class="body ink" x="745" y="527">Backend</text>
  <text class="small muted" x="746" y="548">sim / SDK / robot</text>

  <rect class="evidence" x="190" y="515" width="420" height="58" rx="16"/>
  <text class="mono ink" x="253" y="550">trace / map / report</text>
  <text class="small muted" x="248" y="595">visible evidence from each run</text>

  <path class="line" d="M310 215H368"/>
  <path class="line" d="M600 215H673"/>
  <path class="line" d="M805 260V338"/>
  <path class="line" d="M805 428V483"/>
  <path class="line" d="M685 531H622"/>
  <path class="line" d="M400 515C405 425 520 278 673 232"/>
  <path class="softline" d="M940 338C928 298 918 260 912 235"/>
  <path class="softline" d="M940 360C930 372 924 381 912 389"/>

  <text class="small muted" x="760" y="315">skill composes tools</text>
  <text class="small muted" x="820" y="468">tools execute on backend</text>
  <text class="small muted" x="522" y="505">run evidence</text>
  <text class="small muted" x="448" y="365">evidence feeds back to skill</text>
</svg>
