<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">OpenClaw gives shape, coding agents give loop</title>
  <desc id="desc">A two-panel diagram showing OpenClaw as the product-shaped harness and coding agents as the iterative trace-edit-rerun loop.</desc>
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,5 L0,10 Z" fill="#24313f"/>
    </marker>
    <style>
      .bg { fill: #f6f7f2; }
      .ink { fill: #17212b; }
      .muted { fill: #66717d; }
      .panel { fill: #ffffff; stroke: #24313f; stroke-width: 2.5; }
      .blue { fill: #dceeff; stroke: #24313f; stroke-width: 2.2; }
      .green { fill: #dcf4e7; stroke: #24313f; stroke-width: 2.2; }
      .yellow { fill: #fff0c7; stroke: #24313f; stroke-width: 2.2; }
      .line { stroke: #24313f; stroke-width: 2.5; fill: none; }
      .arrow { stroke: #24313f; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .title { font: 700 36px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .h { font: 700 28px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .body { font: 500 20px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { font: 600 17px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font: 600 18px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="680"/>
  <text class="title ink" x="70" y="72">OpenClaw gave us the shape. Coding agents gave us the loop.</text>

  <rect class="panel" x="70" y="130" width="500" height="455" rx="22"/>
  <text class="h ink" x="110" y="183">Shape</text>
  <text class="body muted" x="110" y="217">A product-shaped robot harness</text>
  <rect class="blue" x="118" y="265" width="170" height="62" rx="12"/>
  <text class="small ink" x="158" y="303">Control UI</text>
  <rect class="blue" x="352" y="265" width="150" height="62" rx="12"/>
  <text class="small ink" x="404" y="303">SOUL</text>
  <rect class="blue" x="118" y="365" width="170" height="62" rx="12"/>
  <text class="small ink" x="176" y="403">Skills</text>
  <rect class="blue" x="352" y="365" width="150" height="62" rx="12"/>
  <text class="small ink" x="403" y="403">MCP</text>
  <rect class="yellow" x="188" y="475" width="240" height="62" rx="12"/>
  <text class="small ink" x="237" y="513">Assistant entry</text>
  <path class="line" d="M288 296h64M203 327v38M427 327v38M288 396h64M308 427v48"/>

  <rect class="panel" x="630" y="130" width="500" height="455" rx="22"/>
  <text class="h ink" x="670" y="183">Loop</text>
  <text class="body muted" x="670" y="217">A faster way to improve skills</text>
  <circle class="green" cx="880" cy="381" r="136"/>
  <text class="mono ink" x="823" y="297">run task</text>
  <text class="mono ink" x="951" y="371">read trace</text>
  <text class="mono ink" x="829" y="493">edit skill</text>
  <text class="mono ink" x="690" y="371">rerun</text>
  <path class="arrow" d="M896 258c78 12 128 74 123 148"/>
  <path class="arrow" d="M1001 461c-54 70-166 82-236 24"/>
  <path class="arrow" d="M726 438c-38-82 4-169 82-196"/>
  <rect class="yellow" x="792" y="352" width="176" height="58" rx="12"/>
  <text class="small ink" x="821" y="387">git diff / review</text>
</svg>
