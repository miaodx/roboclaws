<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="1120" viewBox="0 0 1280 1120" role="img" aria-labelledby="title desc">
  <title id="title">Roboclaws current architecture</title>
  <desc id="desc">Layered architecture diagram showing the current Roboclaws contract from open-ended goals and runnable surfaces through skills, agent engines, capability profiles, MCP tools, thin runtime adapters, backend runtimes, artifacts, reports, and eval suites.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="48%" stop-color="#f3f8f1"/>
      <stop offset="100%" stop-color="#fff8ed"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="guard" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#fef2f2"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="125%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 700 34px system-ui, -apple-system, Segoe UI, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 15px system-ui, -apple-system, Segoe UI, sans-serif; fill: #475569; }
      .level { font: 800 13px system-ui, -apple-system, Segoe UI, sans-serif; fill: #334155; letter-spacing: .08em; }
      .card-title { font: 700 16px system-ui, -apple-system, Segoe UI, sans-serif; fill: #0f172a; }
      .card-text { font: 500 12.5px system-ui, -apple-system, Segoe UI, sans-serif; fill: #475569; }
      .small { font: 650 11.5px system-ui, -apple-system, Segoe UI, sans-serif; fill: #64748b; }
      .band { fill: rgba(255,255,255,.62); stroke: #dbe6ef; stroke-width: 1; rx: 22; }
      .card { fill: #ffffff; stroke: #d7e2ea; stroke-width: 1.15; rx: 12; filter: url(#shadow); }
      .core-card { fill: url(#core); stroke: #0f766e; stroke-width: 1.2; rx: 13; filter: url(#shadow); }
      .core-title { font: 800 16px system-ui, -apple-system, Segoe UI, sans-serif; fill: #ffffff; }
      .core-text { font: 600 12px system-ui, -apple-system, Segoe UI, sans-serif; fill: #dff7ff; }
      .chip { fill: #eef6ff; stroke: #bfd7f2; stroke-width: 1; rx: 10; }
      .ok-chip { fill: #ecfdf5; stroke: #a7f3d0; stroke-width: 1; rx: 10; }
      .warn-chip { fill: url(#guard); stroke: #fed7aa; stroke-width: 1; rx: 10; }
      .line { stroke: #64748b; stroke-width: 2.1; fill: none; marker-end: url(#arrow); }
      .soft-line { stroke: #94a3b8; stroke-width: 1.7; fill: none; marker-end: url(#arrow); stroke-dasharray: 6 6; }
    </style>
  </defs>

  <rect width="1280" height="1120" fill="url(#bg)"/>
  <text x="58" y="62" class="title">Roboclaws Architecture</text>
  <text x="58" y="90" class="subtitle">Open goals become runnable surfaces. Skills own strategy. MCP exposes bounded robot capabilities. Thin adapters bind runtime plumbing.</text>

  <rect x="44" y="120" width="1192" height="100" class="band"/>
  <rect x="44" y="248" width="1192" height="104" class="band"/>
  <rect x="44" y="380" width="1192" height="104" class="band"/>
  <rect x="44" y="512" width="1192" height="104" class="band"/>
  <rect x="44" y="644" width="1192" height="104" class="band"/>
  <rect x="44" y="776" width="1192" height="104" class="band"/>
  <rect x="44" y="908" width="1192" height="108" class="band"/>
  <rect x="44" y="1038" width="1192" height="62" class="band"/>

  <text x="68" y="147" class="level">1. OPEN-ENDED GOAL - RUNNABLE SURFACE / WORLD / BACKEND / INTENT / PRESET</text>
  <text x="68" y="275" class="level">2. AGENT SKILL - STRATEGY LIVES HERE</text>
  <text x="68" y="407" class="level">3. AGENT ENGINE AND PROVIDER PROFILE</text>
  <text x="68" y="539" class="level">4. CAPABILITY PROFILE REQUIREMENTS</text>
  <text x="68" y="671" class="level">5. MCP CAPABILITY CONTRACT AND TOOLS</text>
  <text x="68" y="803" class="level">6. THIN RUNTIME / SERVER ADAPTER</text>
  <text x="68" y="935" class="level">7. BACKEND RUNTIME / ARTIFACTS / EVAL SUITES</text>
  <text x="68" y="1062" class="level">ARCHITECTURE GUARDRAIL</text>

  <rect x="84" y="162" width="248" height="42" class="core-card"/>
  <text x="106" y="187" class="core-title">surface=household-world</text>
  <text x="106" y="200" class="core-text">prompt=... or preset=...</text>
  <rect x="364" y="162" width="190" height="42" class="card"/>
  <text x="386" y="187" class="card-title">preset=map-build</text>
  <rect x="586" y="162" width="184" height="42" class="card"/>
  <text x="608" y="187" class="card-title">preset=cleanup</text>
  <rect x="802" y="162" width="250" height="42" class="card"/>
  <text x="824" y="187" class="card-title">surface=planner-proof</text>
  <rect x="1084" y="162" width="110" height="42" class="chip"/>
  <text x="1102" y="187" class="small">just run::surface</text>

  <rect x="84" y="292" width="222" height="44" class="card"/>
  <text x="106" y="316" class="card-title">open household skill</text>
  <text x="106" y="332" class="card-text">goal, evidence, completion</text>
  <rect x="338" y="292" width="202" height="44" class="card"/>
  <text x="360" y="316" class="card-title">map builder skill</text>
  <text x="360" y="332" class="card-text">observe, sweep, snapshot</text>
  <rect x="572" y="292" width="202" height="44" class="card"/>
  <text x="594" y="316" class="card-title">cleanup skill</text>
  <text x="594" y="332" class="card-text">navigate - pick - place</text>
  <rect x="806" y="292" width="206" height="44" class="card"/>
  <text x="828" y="316" class="card-title">planner-proof skill</text>
  <text x="828" y="332" class="card-text">bounded proof handoff</text>
  <rect x="1044" y="292" width="150" height="44" class="ok-chip"/>
  <text x="1062" y="316" class="small">Prompt policy and</text>
  <text x="1062" y="332" class="small">recovery loops</text>

  <rect x="84" y="424" width="176" height="44" class="card"/>
  <text x="106" y="448" class="card-title">direct-runner</text>
  <text x="106" y="464" class="card-text">deterministic path</text>
  <rect x="292" y="424" width="160" height="44" class="card"/>
  <text x="314" y="448" class="card-title">codex-cli</text>
  <text x="314" y="464" class="card-text">coding agent</text>
  <rect x="484" y="424" width="166" height="44" class="card"/>
  <text x="506" y="448" class="card-title">claude-code</text>
  <text x="506" y="464" class="card-text">coding agent</text>
  <rect x="682" y="424" width="204" height="44" class="card"/>
  <text x="704" y="448" class="card-title">openai-agents-sdk</text>
  <text x="704" y="464" class="card-text">active stabilization</text>
  <rect x="918" y="424" width="276" height="44" class="warn-chip"/>
  <text x="936" y="448" class="small">OpenClaw / Hermes-style frameworks</text>
  <text x="936" y="464" class="small">later clients after lower routes stabilize</text>

  <rect x="84" y="556" width="246" height="44" class="core-card"/>
  <text x="106" y="580" class="core-title">household_world</text>
  <text x="106" y="596" class="core-text">map, observe, navigate context</text>
  <rect x="362" y="556" width="242" height="44" class="card"/>
  <text x="384" y="580" class="card-title">household_episode</text>
  <text x="384" y="596" class="card-text">open task and map-build lifecycle</text>
  <rect x="636" y="556" width="270" height="44" class="card"/>
  <text x="658" y="580" class="card-title">household_manipulation</text>
  <text x="658" y="596" class="card-text">pick, place, open, close when proven</text>
  <rect x="938" y="556" width="256" height="44" class="ok-chip"/>
  <text x="956" y="580" class="small">Profiles compose requirements</text>
  <text x="956" y="596" class="small">and do not copy task strategy</text>

  <rect x="84" y="688" width="192" height="44" class="core-card"/>
  <text x="106" y="712" class="core-title">MCP tools</text>
  <text x="106" y="728" class="core-text">bounded public robot API</text>
  <rect x="308" y="688" width="146" height="44" class="chip"/>
  <text x="330" y="712" class="small">observe / map</text>
  <text x="330" y="728" class="small">metric evidence</text>
  <rect x="486" y="688" width="154" height="44" class="chip"/>
  <text x="508" y="712" class="small">navigate / done</text>
  <text x="508" y="728" class="small">lifecycle</text>
  <rect x="672" y="688" width="158" height="44" class="chip"/>
  <text x="694" y="712" class="small">pick / place</text>
  <text x="694" y="728" class="small">manipulation</text>
  <rect x="862" y="688" width="332" height="44" class="warn-chip"/>
  <text x="880" y="712" class="small">No hidden scorer truth, benchmark hints, or opaque</text>
  <text x="880" y="728" class="small">task shortcut belongs in the MCP/server surface</text>

  <rect x="84" y="820" width="206" height="44" class="core-card"/>
  <text x="106" y="844" class="core-title">Thin adapters</text>
  <text x="106" y="860" class="core-text">transport and lifecycle only</text>
  <rect x="322" y="820" width="174" height="44" class="chip"/>
  <text x="344" y="844" class="small">launch catalog</text>
  <text x="344" y="860" class="small">axis lowering</text>
  <rect x="528" y="820" width="174" height="44" class="chip"/>
  <text x="550" y="844" class="small">live_runtime</text>
  <text x="550" y="860" class="small">request/result</text>
  <rect x="734" y="820" width="174" height="44" class="chip"/>
  <text x="756" y="844" class="small">agent_server</text>
  <text x="756" y="860" class="small">target lifecycle</text>
  <rect x="940" y="820" width="254" height="44" class="chip"/>
  <text x="962" y="844" class="small">operator console and eval live bridge</text>
  <text x="962" y="860" class="small">locks, ports, run dirs, polling</text>

  <rect x="84" y="952" width="180" height="44" class="card"/>
  <text x="106" y="976" class="card-title">MuJoCo / Molmo</text>
  <text x="106" y="992" class="card-text">current household default</text>
  <rect x="296" y="952" width="154" height="44" class="card"/>
  <text x="318" y="976" class="card-title">Isaac Lab</text>
  <text x="318" y="992" class="card-text">explicit gate</text>
  <rect x="482" y="952" width="154" height="44" class="card"/>
  <text x="504" y="976" class="card-title">Agibot GDK</text>
  <text x="504" y="992" class="card-text">backend variant</text>
  <rect x="668" y="952" width="154" height="44" class="card"/>
  <text x="690" y="976" class="card-title">ROS2 / Nav2</text>
  <text x="690" y="992" class="card-text">future robot path</text>
  <rect x="854" y="944" width="340" height="60" class="core-card"/>
  <text x="876" y="968" class="core-title">Artifacts, reports, eval suites</text>
  <text x="876" y="984" class="core-text">trace, agent_view, runtime map, report.html,</text>
  <text x="876" y="1000" class="core-text">eval_results, pass@k/pass^k, model metrics</text>

  <text x="68" y="1084" class="card-text">Every addition names its owning architecture layer before implementation.</text>
  <text x="660" y="1084" class="card-text">Retired historical routes: AI2-THOR direct demos, VLM Direct, route-card demos.</text>

  <path class="line" d="M208 204 L195 292"/>
  <path class="line" d="M459 204 L439 292"/>
  <path class="line" d="M678 204 L673 292"/>
  <path class="line" d="M927 204 L909 292"/>
  <path class="line" d="M641 336 L641 424"/>
  <path class="line" d="M641 468 L641 556"/>
  <path class="line" d="M641 600 L641 688"/>
  <path class="line" d="M641 732 L641 820"/>
  <path class="line" d="M641 864 L641 952"/>
  <path class="soft-line" d="M1118 336 L1118 424"/>
  <path class="soft-line" d="M1028 732 L1028 820"/>
</svg>
