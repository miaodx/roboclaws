<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="980" viewBox="0 0 1280 980" role="img" aria-labelledby="title desc">
  <title id="title">Roboclaws composable surface, intent, skill, and MCP capability profile ladder</title>
  <desc id="desc">Detailed architecture diagram showing runnable surfaces and intents selecting skills, skills composing MCP tools through reusable capability profile requirements, backend variants including real robots, privileged boundaries, and report feedback.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="55%" stop-color="#f6fbf7"/>
      <stop offset="100%" stop-color="#fff9ef"/>
    </linearGradient>
    <linearGradient id="focus" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-10%" width="116%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="softArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <style>
      .title { font: 800 31px system-ui, -apple-system, Segoe UI, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 15px system-ui, -apple-system, Segoe UI, sans-serif; fill: #475569; }
      .section { font: 800 13px system-ui, -apple-system, Segoe UI, sans-serif; fill: #334155; letter-spacing: .07em; }
      .band { fill: rgba(255,255,255,.64); stroke: #d7e2ea; stroke-width: 1.2; rx: 24; }
      .public-band { fill: #eff6ff; stroke: #c7dcf5; stroke-width: 1.2; rx: 24; }
      .private-band { fill: #fff7ed; stroke: #fed7aa; stroke-width: 1.2; rx: 24; }
      .card { fill: #ffffff; stroke: #d7e2ea; stroke-width: 1.2; rx: 16; filter: url(#shadow); }
      .focus-card { fill: url(#focus); stroke: #0f766e; stroke-width: 1.2; rx: 18; filter: url(#shadow); }
      .card-title { font: 800 17px system-ui, -apple-system, Segoe UI, sans-serif; fill: #0f172a; }
      .card-text { font: 500 12.5px system-ui, -apple-system, Segoe UI, sans-serif; fill: #475569; }
      .focus-title { font: 800 18px system-ui, -apple-system, Segoe UI, sans-serif; fill: #ffffff; }
      .focus-text { font: 600 12.5px system-ui, -apple-system, Segoe UI, sans-serif; fill: #dff7ff; }
      .label { font: 800 12px system-ui, -apple-system, Segoe UI, sans-serif; fill: #334155; letter-spacing: .06em; }
      .chip { fill: #eef6ff; stroke: #bfd7f2; stroke-width: 1; rx: 12; }
      .ok-chip { fill: #ecfdf5; stroke: #a7f3d0; stroke-width: 1; rx: 12; }
      .warn-chip { fill: #fff7ed; stroke: #fed7aa; stroke-width: 1; rx: 12; }
      .chip-text { font: 700 12px system-ui, -apple-system, Segoe UI, sans-serif; fill: #334155; }
      .line { stroke: #64748b; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .soft-line { stroke: #94a3b8; stroke-width: 1.8; fill: none; marker-end: url(#softArrow); stroke-dasharray: 7 6; }
      .block-line { stroke: #ea580c; stroke-width: 2; fill: none; marker-end: url(#softArrow); stroke-dasharray: 4 6; }
    </style>
  </defs>

  <rect width="1280" height="980" fill="url(#background)"/>

  <text x="58" y="58" class="title">Composable Surface / Intent / Skill / Capability Profile Ladder</text>
  <text x="58" y="86" class="subtitle">Surfaces and intents own public runs. Skills compose behavior. Profiles define reusable capability environments. MCP tools stay stable.</text>

  <rect x="46" y="116" width="1188" height="116" class="public-band"/>
  <text x="70" y="146" class="section">PUBLIC RUN SURFACE</text>
  <rect x="92" y="168" width="210" height="42" class="chip"/>
  <text x="114" y="195" class="chip-text">Open-ended goal</text>
  <rect x="366" y="154" width="240" height="70" class="focus-card"/>
  <text x="390" y="181" class="focus-title">Surface + Intent</text>
  <text x="390" y="203" class="focus-text">household-world: map-build, cleanup</text>
  <rect x="676" y="168" width="220" height="42" class="ok-chip"/>
  <text x="698" y="195" class="chip-text">Parameters + reports</text>
  <rect x="960" y="168" width="200" height="42" class="ok-chip"/>
  <text x="982" y="195" class="chip-text">Acceptance gates</text>
  <path class="line" d="M302 189 L366 189"/>
  <path class="soft-line" d="M606 189 L676 189"/>
  <path class="soft-line" d="M896 189 L960 189"/>

  <rect x="46" y="264" width="1188" height="126" class="band"/>
  <text x="70" y="294" class="section">SKILL STRATEGY AND COMPOSITION</text>
  <rect x="94" y="318" width="250" height="44" class="chip"/>
  <text x="116" y="346" class="chip-text">Agent Skill</text>
  <rect x="414" y="306" width="330" height="68" class="card"/>
  <text x="438" y="333" class="card-title">Trace-preserving routine</text>
  <text x="438" y="354" class="card-text">navigate_to_object -> pick -> place</text>
  <rect x="814" y="318" width="320" height="44" class="chip"/>
  <text x="836" y="346" class="chip-text">Prompts, scripts, recovery, examples</text>
  <path class="line" d="M486 224 L486 306"/>

  <rect x="46" y="422" width="1188" height="196" class="public-band"/>
  <text x="70" y="452" class="section">CAPABILITY PROFILE REQUIREMENTS: COMPOSE, DO NOT COPY</text>
  <rect x="82" y="488" width="238" height="86" class="focus-card"/>
  <text x="106" y="516" class="focus-title">household_world</text>
  <text x="106" y="540" class="focus-text">metric map, runtime evidence,</text>
  <text x="106" y="560" class="focus-text">observe, waypoint nav</text>
  <rect x="366" y="488" width="258" height="86" class="card"/>
  <text x="390" y="516" class="card-title">manipulation profile</text>
  <text x="390" y="540" class="card-text">pick, place, open, close</text>
  <text x="390" y="560" class="card-text">or blocked capability</text>
  <rect x="670" y="488" width="242" height="86" class="card"/>
  <text x="694" y="516" class="card-title">other modules</text>
  <text x="694" y="540" class="card-text">search, photo capture,</text>
  <text x="694" y="560" class="card-text">inspection, memory</text>
  <rect x="958" y="488" width="226" height="86" class="warn-chip"/>
  <text x="982" y="520" class="chip-text">No copied profile:</text>
  <text x="982" y="542" class="chip-text">world + cleanup + search</text>
  <text x="982" y="564" class="chip-text">as one duplicated bundle</text>
  <path class="line" d="M486 374 L202 488"/>
  <path class="line" d="M486 374 L495 488"/>
  <path class="soft-line" d="M486 374 L791 488"/>
  <path class="block-line" d="M912 531 L958 531"/>

  <rect x="46" y="650" width="1188" height="126" class="band"/>
  <text x="70" y="680" class="section">STABLE MCP TOOLS</text>
  <rect x="96" y="718" width="186" height="34" class="chip"/>
  <text x="118" y="740" class="chip-text">metric_map</text>
  <rect x="316" y="718" width="186" height="34" class="chip"/>
  <text x="338" y="740" class="chip-text">observe</text>
  <rect x="536" y="718" width="186" height="34" class="chip"/>
  <text x="558" y="740" class="chip-text">navigate</text>
  <rect x="756" y="718" width="186" height="34" class="chip"/>
  <text x="778" y="740" class="chip-text">pick / place</text>
  <rect x="976" y="718" width="186" height="34" class="chip"/>
  <text x="998" y="740" class="chip-text">done / report</text>
  <path class="line" d="M202 574 L202 718"/>
  <path class="line" d="M495 574 L849 718"/>

  <rect x="46" y="808" width="1188" height="92" class="band"/>
  <text x="70" y="838" class="section">BACKEND VARIANTS AND REAL ROBOT DEPLOYMENT</text>
  <rect x="96" y="860" width="170" height="28" class="chip"/>
  <text x="118" y="879" class="chip-text">molmospaces</text>
  <rect x="310" y="860" width="170" height="28" class="chip"/>
  <text x="332" y="879" class="chip-text">api synthetic</text>
  <rect x="524" y="860" width="170" height="28" class="chip"/>
  <text x="546" y="879" class="chip-text">agibot_g2</text>
  <rect x="738" y="860" width="170" height="28" class="chip"/>
  <text x="760" y="879" class="chip-text">ros2_nav2</text>
  <rect x="952" y="860" width="206" height="28" class="ok-chip"/>
  <text x="974" y="879" class="chip-text">safety gates + provenance</text>
  <path class="line" d="M640 752 L640 808"/>

  <rect x="46" y="922" width="1188" height="36" class="private-band"/>
  <text x="70" y="945" class="label">REPORTS AND EVALS FEED TASK/SKILL MAINTENANCE; PRIVATE SCORING TRUTH STAYS OUT OF PUBLIC PROFILES.</text>
  <path class="soft-line" d="M1188 940 C1230 720 1220 188 1160 189"/>
</svg>
