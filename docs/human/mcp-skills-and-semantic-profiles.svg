<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="980" viewBox="0 0 1280 980" role="img" aria-labelledby="title desc">
  <title id="title">Roboclaws skill-first MCP abstraction ladder</title>
  <desc id="desc">Detailed architecture diagram showing open-ended goals, agent skills, composite actions, semantic capabilities, MCP profiles, environment primitives, execution backends, privileged tools, and report feedback.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="56%" stop-color="#f6fbf7"/>
      <stop offset="100%" stop-color="#fff9ef"/>
    </linearGradient>
    <linearGradient id="skill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-10%" width="116%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="softArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <style>
      .title { font: 800 32px system-ui, -apple-system, Segoe UI, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 15px system-ui, -apple-system, Segoe UI, sans-serif; fill: #475569; }
      .section { font: 800 13px system-ui, -apple-system, Segoe UI, sans-serif; fill: #334155; letter-spacing: .07em; }
      .card { fill: #ffffff; stroke: #d7e2ea; stroke-width: 1.2; rx: 18; filter: url(#shadow); }
      .skill-card { fill: url(#skill); stroke: #0f766e; stroke-width: 1.2; rx: 20; filter: url(#shadow); }
      .band { fill: rgba(255,255,255,.64); stroke: #d7e2ea; stroke-width: 1.2; rx: 24; }
      .public-band { fill: #eff6ff; stroke: #c7dcf5; stroke-width: 1.2; rx: 24; }
      .private-band { fill: #fff7ed; stroke: #fed7aa; stroke-width: 1.2; rx: 24; }
      .card-title { font: 800 18px system-ui, -apple-system, Segoe UI, sans-serif; fill: #0f172a; }
      .card-text { font: 500 13px system-ui, -apple-system, Segoe UI, sans-serif; fill: #475569; }
      .small { font: 700 12px system-ui, -apple-system, Segoe UI, sans-serif; fill: #64748b; }
      .skill-title { font: 800 20px system-ui, -apple-system, Segoe UI, sans-serif; fill: #ffffff; }
      .skill-text { font: 600 13px system-ui, -apple-system, Segoe UI, sans-serif; fill: #dff7ff; }
      .label { font: 800 12px system-ui, -apple-system, Segoe UI, sans-serif; fill: #334155; letter-spacing: .06em; }
      .chip { fill: #eef6ff; stroke: #bfd7f2; stroke-width: 1; rx: 12; }
      .ok-chip { fill: #ecfdf5; stroke: #a7f3d0; stroke-width: 1; rx: 12; }
      .warn-chip { fill: #fff7ed; stroke: #fed7aa; stroke-width: 1; rx: 12; }
      .chip-text { font: 700 12px system-ui, -apple-system, Segoe UI, sans-serif; fill: #334155; }
      .line { stroke: #64748b; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .soft-line { stroke: #94a3b8; stroke-width: 1.8; fill: none; marker-end: url(#softArrow); stroke-dasharray: 7 6; }
      .block-line { stroke: #ea580c; stroke-width: 2; fill: none; marker-end: url(#softArrow); stroke-dasharray: 4 6; }
    </style>
  </defs>

  <rect width="1280" height="980" fill="url(#background)"/>

  <text x="60" y="58" class="title">Skill-First MCP Abstraction Ladder</text>
  <text x="60" y="86" class="subtitle">Skills own reusable behavior. MCP profiles bound public robot capabilities. Backends execute primitives.</text>

  <rect x="48" y="118" width="1184" height="118" class="public-band"/>
  <text x="72" y="148" class="section">HUMAN INTENT AND SKILL LIFECYCLE</text>
  <rect x="92" y="170" width="214" height="42" class="chip"/>
  <text x="114" y="197" class="chip-text">Open-ended goal</text>
  <rect x="370" y="156" width="238" height="70" class="skill-card"/>
  <text x="394" y="184" class="skill-title">Agent Skill</text>
  <text x="394" y="206" class="skill-text">prompts, scripts, checks</text>
  <rect x="672" y="170" width="194" height="42" class="ok-chip"/>
  <text x="694" y="197" class="chip-text">Create / improve</text>
  <rect x="930" y="170" width="194" height="42" class="ok-chip"/>
  <text x="952" y="197" class="chip-text">Refactor / prune</text>
  <path class="line" d="M306 191 L370 191"/>
  <path class="soft-line" d="M608 191 L672 191"/>
  <path class="soft-line" d="M866 191 L930 191"/>

  <rect x="48" y="268" width="1184" height="124" class="band"/>
  <text x="72" y="298" class="section">SKILL INTERNAL SHAPE</text>
  <rect x="96" y="322" width="250" height="44" class="chip"/>
  <text x="118" y="350" class="chip-text">Composite action</text>
  <rect x="418" y="312" width="330" height="64" class="card"/>
  <text x="442" y="339" class="card-title">Composed semantic capability</text>
  <text x="442" y="360" class="card-text">localization, navigation, search, transport</text>
  <rect x="820" y="322" width="320" height="44" class="chip"/>
  <text x="842" y="350" class="chip-text">Example: locate -> navigate -> observe</text>
  <path class="line" d="M489 226 L489 312"/>

  <rect x="48" y="424" width="1184" height="174" class="public-band"/>
  <text x="72" y="454" class="section">MCP PROFILE: PUBLIC CAPABILITY BOUNDARY</text>
  <rect x="82" y="486" width="238" height="74" class="card"/>
  <text x="106" y="514" class="card-title">Atomic capabilities</text>
  <text x="106" y="538" class="card-text">observe, move, turn,</text>
  <text x="106" y="558" class="card-text">pick, place, open, close</text>
  <rect x="382" y="478" width="294" height="92" class="skill-card"/>
  <text x="406" y="508" class="skill-title">Contract profile</text>
  <text x="406" y="534" class="skill-text">canonical tools, families,</text>
  <text x="406" y="554" class="skill-text">provenance, exclusions</text>
  <rect x="742" y="486" width="214" height="74" class="card"/>
  <text x="766" y="514" class="card-title">Privileged tools</text>
  <text x="766" y="538" class="card-text">scene_objects, goto,</text>
  <text x="766" y="558" class="card-text">hidden evaluator truth</text>
  <rect x="1018" y="486" width="170" height="74" class="warn-chip"/>
  <text x="1040" y="515" class="chip-text">Resist adding</text>
  <text x="1040" y="535" class="chip-text">MCP tools</text>
  <path class="line" d="M582 376 L529 478"/>
  <path class="line" d="M382 524 L320 524"/>
  <path class="block-line" d="M676 524 L742 524"/>
  <path class="block-line" d="M956 524 L1018 524"/>

  <rect x="48" y="630" width="1184" height="118" class="band"/>
  <text x="72" y="660" class="section">ENVIRONMENT PRIMITIVES</text>
  <rect x="100" y="690" width="218" height="36" class="chip"/>
  <text x="122" y="713" class="chip-text">AI2-THOR controller step</text>
  <rect x="374" y="690" width="218" height="36" class="chip"/>
  <text x="396" y="713" class="chip-text">MolmoSpaces state/action</text>
  <rect x="648" y="690" width="218" height="36" class="chip"/>
  <text x="670" y="713" class="chip-text">Robot SDK/API call</text>
  <rect x="922" y="690" width="218" height="36" class="chip"/>
  <text x="944" y="713" class="chip-text">Mock proof primitive</text>
  <path class="line" d="M529 570 L529 630"/>

  <rect x="48" y="780" width="1184" height="112" class="band"/>
  <text x="72" y="810" class="section">EXECUTION BACKENDS</text>
  <rect x="90" y="838" width="116" height="30" class="chip"/>
  <text x="112" y="858" class="small">Mock only</text>
  <rect x="238" y="838" width="116" height="30" class="chip"/>
  <text x="260" y="858" class="small">AI2-THOR</text>
  <rect x="386" y="838" width="132" height="30" class="chip"/>
  <text x="408" y="858" class="small">MolmoSpaces</text>
  <rect x="550" y="838" width="116" height="30" class="chip"/>
  <text x="572" y="858" class="small">Unitree G1</text>
  <rect x="698" y="838" width="98" height="30" class="chip"/>
  <text x="720" y="858" class="small">RBY1M</text>
  <rect x="828" y="838" width="116" height="30" class="chip"/>
  <text x="850" y="858" class="small">AGIbot G2</text>
  <rect x="976" y="838" width="132" height="30" class="chip"/>
  <text x="998" y="858" class="small">Future robots</text>
  <path class="line" d="M529 726 L529 780"/>

  <rect x="48" y="918" width="1184" height="38" class="private-band"/>
  <text x="72" y="942" class="label">REPORTS AND EVALS FEED THE SKILL LIBRARY; PRIVATE SCORING TRUTH STAYS OUT OF PUBLIC PROFILE METADATA.</text>
  <path class="soft-line" d="M1188 936 C1232 720 1208 202 1124 191"/>
</svg>
