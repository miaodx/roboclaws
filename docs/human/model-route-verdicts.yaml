schema: roboclaws_model_route_verdicts_v1
last_reviewed: 2026-06-16
source_of_truth:
  registry: roboclaws/agents/provider_registry.py
  narrative: docs/human/model-matrix.md
verdicts:
  - agent_engine: codex-cli
    provider_route: codex-router-responses
    provider_profile: codex-router-responses
    model_id: gpt-5.5
    route_status: healthy
    lane_verdicts:
      structured_labels: healthy
      camera_grounded_labels: healthy
      camera_raw_fpv: healthy
    evidence: current local cleanup evidence
    notes: Default Codex Responses route; requires CODEX_BASE_URL and CODEX_API_KEY.
  - agent_engine: codex-cli
    provider_route: mimo-mify-responses
    provider_profile: mimo-mify-responses
    model_id: xiaomi/mimo-v2.5
    route_status: degraded
    lane_verdicts:
      structured_labels: degraded
      camera_grounded_labels: degraded
      camera_raw_fpv: blocked
    evidence: current local Codex/mimo-mify-responses probes
    notes: MCP calls work, but current probes can early-stop after one live-agent turn.
  - agent_engine: codex-cli
    provider_route: minimax-responses
    provider_profile: minimax-responses
    model_id: MiniMax-M3
    route_status: blocked
    lane_verdicts:
      structured_labels: blocked
      camera_grounded_labels: blocked
      camera_raw_fpv: blocked
    evidence: local Codex 0.130.0 cleanup run and Codex 0.139.0 MCP smoke probes
    notes: MiniMax Responses auth/transport connects, but Codex's MCP router rejects MiniMax-emitted tool names such as mcp__cleanup__metric_map and cleanup__ping_tool as unsupported calls.
  - agent_engine: codex-cli
    provider_route: minimax-responses
    provider_profile: minimax-responses
    model_id: MiniMax-M2.7-highspeed
    route_status: blocked
    lane_verdicts:
      structured_labels: blocked
      camera_grounded_labels: blocked
      camera_raw_fpv: blocked
    evidence: local Codex 0.130.0 cleanup run and Codex 0.139.0 MCP smoke probes
    notes: Same MCP tool-name routing failure as MiniMax-M3; keep only as an explicit re-review route until Codex or MiniMax changes the Responses MCP tool-call shape.
  - agent_engine: openai-agents-sdk
    provider_route: codex-router-responses
    provider_profile: codex-router-responses
    model_id: gpt-5.5
    route_status: experimental
    lane_verdicts:
      structured_labels: experimental
      camera_grounded_labels: experimental
      camera_raw_fpv: healthy
    evidence: experimental SDK route
    notes: SDK route remains non-default.
  - agent_engine: openai-agents-sdk
    provider_route: mimo-tp-openai-chat
    provider_profile: mimo-tp-openai-chat
    model_id: mimo-v2.5
    route_status: healthy
    lane_verdicts:
      structured_labels: healthy
      camera_grounded_labels: healthy
      camera_raw_fpv: blocked
    evidence: local non-raw-FPV Agent SDK cleanup evidence
    notes: Chat transport is suitable for structured lanes; raw FPV is blocked by route image transport.
  - agent_engine: openai-agents-sdk
    provider_route: mimo-inside-openai-chat
    provider_profile: mimo-inside-openai-chat
    model_id: mimo-1000
    route_status: provisional
    lane_verdicts:
      structured_labels: experimental
      camera_grounded_labels: experimental
      camera_raw_fpv: blocked
    evidence: dev model-matrix throughput probes; product cleanup verdict pending
    notes: Default-enabled on-demand UltraSpeed route for benchmarks and explicit text-agent experiments, not a product cleanup default until a separate route decision promotes it.
  - agent_engine: openai-agents-sdk
    provider_route: kimi-openai-chat
    provider_profile: kimi-openai-chat
    model_id: kimi-k2.7-code
    route_status: experimental
    lane_verdicts:
      structured_labels: experimental
      camera_grounded_labels: experimental
      camera_raw_fpv: blocked
    evidence: 2026-06-16 Kimi OpenAI Chat thinking probes; cleanup verdict pending
    notes: Default model is kimi-k2.7-code. Kimi K2.7 Code requires Thinking On for the new code-model behavior. OpenAI Agents SDK uses model_thinking_mode=default|enabled|disabled and maps Chat routes to thinking={type: enabled, keep: all} or thinking={type: disabled}; disabled is diagnostic/A-B only because it disables reasoning_content on probed Chat routes.
  - agent_engine: openai-agents-sdk
    provider_route: minimax-responses
    provider_profile: minimax-responses
    model_id: MiniMax-M3
    route_status: healthy
    lane_verdicts:
      structured_labels: healthy
      camera_grounded_labels: experimental
      camera_raw_fpv: blocked
    evidence: local OpenAI Agents SDK cleanup run completed with score.status=success
    notes: Default MiniMax model. M3 is multimodal and image-capable, but raw FPV remains blocked until runtime image transport is verified for this route.
  - agent_engine: openai-agents-sdk
    provider_route: minimax-responses
    provider_profile: minimax-responses
    model_id: MiniMax-M2.7-highspeed
    route_status: healthy
    lane_verdicts:
      structured_labels: healthy
      camera_grounded_labels: experimental
      camera_raw_fpv: blocked
    evidence: local OpenAI Agents SDK cleanup run completed with score.status=success
    notes: Explicit non-default text-only variant. The single paired cleanup run did not show a speed advantage over MiniMax-M3.
  - agent_engine: claude-code
    provider_route: mimo-tp-anthropic
    provider_profile: mimo-tp-anthropic
    model_id: mimo-v2.5
    route_status: healthy
    lane_verdicts:
      structured_labels: healthy
      camera_grounded_labels: healthy
      camera_raw_fpv: healthy
    evidence: current Claude Code household route evidence
    notes: Default Claude Code route when MIMO_TP_KEY is configured.
  - agent_engine: claude-code
    provider_route: kimi-anthropic
    provider_profile: kimi-anthropic
    model_id: kimi-k2.6
    route_status: healthy
    lane_verdicts:
      structured_labels: healthy
      camera_grounded_labels: healthy
      camera_raw_fpv: healthy
    evidence: current Claude Code household route evidence
    notes: Kimi can be selected explicitly with ROBOCLAWS_PROVIDER_PROFILE.
  - agent_engine: claude-code
    provider_route: mimo-mify-anthropic
    provider_profile: mimo-mify-anthropic
    model_id: xiaomi/mimo-v2.5
    route_status: experimental
    lane_verdicts:
      structured_labels: experimental
      camera_grounded_labels: experimental
      camera_raw_fpv: experimental
    evidence: gateway route wired; cleanup verdict pending
    notes: Uses XM_LLM_API_KEY through the Anthropic-compatible mimo-mify-responses gateway.
