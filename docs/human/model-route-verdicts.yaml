  - agent_engine: openai-agents-sdk
    provider_route: mimo-tp-openai-chat
    provider_profile: mimo-tp-openai-chat
    model_id: mimo-v2.5
    route_status: healthy
    lane_verdicts:
      structured_labels: healthy
      camera_grounded_labels: healthy
      camera_raw_fpv: blocked
    evidence: local non-raw-FPV Agent SDK cleanup evidence
    notes: Chat transport is suitable for structured lanes; raw FPV is blocked by route image transport.
  - agent_engine: openai-agents-sdk
    provider_route: mimo-inside-openai-chat
    provider_profile: mimo-inside-openai-chat
    model_id: mimo-1000
    route_status: provisional
    lane_verdicts:
      structured_labels: experimental
      camera_grounded_labels: experimental
      camera_raw_fpv: blocked
    evidence: dev model-matrix throughput probes; product cleanup verdict pending
    notes: Default-enabled on-demand UltraSpeed route for benchmarks and explicit text-agent experiments, not a product cleanup default until a separate route decision promotes it.
  - agent_engine: openai-agents-sdk
    provider_route: kimi-openai-chat
    provider_profile: kimi-openai-chat
    model_id: kimi-k2.7-code
    route_status: experimental
    lane_verdicts:
      structured_labels: experimental
      camera_grounded_labels: experimental
      camera_raw_fpv: blocked
    evidence: output/dev/model-matrix/20260622_170914/model_matrix_benchmark.json plus 2026-06-22 suffix probe with kimi-k2.7-code-highspeed-not-exist
    notes: Default model is kimi-k2.7-code. Kimi K2.7 Code routes are thinking-only and no longer send the old explicit thinking body. The provider accepts arbitrary K2.7 suffixes and echoes them, so suffix variants are not treated as catalog models.
  - agent_engine: openai-agents-sdk
    provider_route: minimax-responses
    provider_profile: minimax-responses
    model_id: MiniMax-M3
    route_status: healthy
    lane_verdicts:
      structured_labels: healthy
      camera_grounded_labels: experimental
      camera_raw_fpv: blocked
    evidence: local OpenAI Agents SDK cleanup run completed with score.status=success
    notes: Default MiniMax model. M3 is multimodal and image-capable, but raw FPV remains blocked until runtime image transport is verified for this route.
