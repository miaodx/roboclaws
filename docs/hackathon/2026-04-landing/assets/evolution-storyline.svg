<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="960" viewBox="0 0 1440 960" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1440" y2="960" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F1E8"/>
      <stop offset="1" stop-color="#ECF6FB"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFF4EB"/>
      <stop offset="1" stop-color="#FDE3CF"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#EEF5FF"/>
      <stop offset="1" stop-color="#D8E8FF"/>
    </linearGradient>
    <linearGradient id="card3" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ECFDF3"/>
      <stop offset="1" stop-color="#D5F7E4"/>
    </linearGradient>
    <linearGradient id="card4" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F6F0FF"/>
      <stop offset="1" stop-color="#E7DCFF"/>
    </linearGradient>
    <linearGradient id="banner" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#102A43"/>
      <stop offset="1" stop-color="#243B53"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#102A43" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 48px 'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif; fill: #102A43; }
      .subtitle { font: 500 22px 'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif; fill: #486581; }
      .phase { font: 700 20px 'SFMono-Regular','Menlo','Consolas',monospace; fill: #7C2D12; }
      .cardTitle { font: 700 24px 'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif; fill: #102A43; }
      .body { font: 500 18px 'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif; fill: #334E68; }
      .bodyStrong { font: 700 18px 'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif; fill: #102A43; }
      .pill { font: 700 16px 'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif; }
      .bannerText { font: 700 30px 'SFMono-Regular','Menlo','Consolas',monospace; fill: #F8FAFC; }
      .bannerSub { font: 500 20px 'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif; fill: #D9E2EC; }
    </style>
  </defs>

  <rect width="1440" height="960" fill="url(#bg)"/>

  <text x="84" y="96" class="title">Roboclaws 的四段式演化：不是替换关系，而是层层加出来的</text>
  <text x="84" y="136" class="subtitle">评委应该看到的不只是 Run 005，而是这条链路如何从“能动起来”走到“能持续变好并能对外展示”</text>

  <g filter="url(#shadow)">
    <rect x="70" y="204" width="300" height="440" rx="30" fill="url(#card1)"/>
    <text x="102" y="250" class="phase">PHASE 1</text>
    <text x="102" y="292" class="cardTitle">Direct VLM games</text>
    <text x="102" y="338" class="bodyStrong">先验证：图像能不能直接驱动决策</text>
    <text x="102" y="384" class="body">代表入口：</text>
    <text x="102" y="414" class="body">single_agent_explore</text>
    <text x="102" y="444" class="body">territory_game / coverage_game</text>
    <text x="102" y="494" class="body">沉淀结论：</text>
    <text x="102" y="524" class="body">prompt / provider / action space</text>
    <text x="102" y="554" class="body">可以先用最低成本迭代。</text>
    <rect x="102" y="590" width="156" height="36" rx="14" fill="#FECACA"/>
    <text x="132" y="614" class="pill" fill="#991B1B">Can move</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="400" y="204" width="300" height="440" rx="30" fill="url(#card2)"/>
    <text x="432" y="250" class="phase">PHASE 2</text>
    <text x="432" y="292" class="cardTitle">OpenClaw Gateway</text>
    <text x="432" y="338" class="bodyStrong">再验证：agent runtime 能不能活起来</text>
    <text x="432" y="384" class="body">代表能力：</text>
    <text x="432" y="414" class="body">SOUL / memory / named agents</text>
    <text x="432" y="444" class="body">Control UI / photo smoke</text>
    <text x="432" y="494" class="body">沉淀结论：</text>
    <text x="432" y="524" class="body">长期在线、浏览器交互、</text>
    <text x="432" y="554" class="body">hosted appliance 都能成立。</text>
    <rect x="432" y="590" width="156" height="36" rx="14" fill="#DBEAFE"/>
    <text x="462" y="614" class="pill" fill="#1D4ED8">Can live</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="730" y="204" width="300" height="440" rx="30" fill="url(#card3)"/>
    <text x="762" y="250" class="phase">PHASE 3</text>
    <text x="762" y="292" class="cardTitle">Mode 3 + Harness</text>
    <text x="762" y="338" class="bodyStrong">最后验证：系统能不能稳定变好</text>
    <text x="762" y="384" class="body">代表能力：</text>
    <text x="762" y="414" class="body">fresh CLI agent spawn</text>
    <text x="762" y="444" class="body">trace.jsonl / runs-log / metrics</text>
    <text x="762" y="494" class="body">沉淀结论：</text>
    <text x="762" y="524" class="body">clean rerun、append-only</text>
    <text x="762" y="554" class="body">logbook、A/B 迭代真正成立。</text>
    <rect x="762" y="590" width="180" height="36" rx="14" fill="#BBF7D0"/>
    <text x="792" y="614" class="pill" fill="#166534">Can improve</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1060" y="204" width="300" height="440" rx="30" fill="url(#card4)"/>
    <text x="1092" y="250" class="phase">PHASE 4</text>
    <text x="1092" y="292" class="cardTitle">Railway appliance</text>
    <text x="1092" y="338" class="bodyStrong">把能力压成一个可访问的 demo 形态</text>
    <text x="1092" y="384" class="body">代表能力：</text>
    <text x="1092" y="414" class="body">single-container appliance</text>
    <text x="1092" y="444" class="body">外部访问 / 对外展示 / hosted</text>
    <text x="1092" y="494" class="body">沉淀结论：</text>
    <text x="1092" y="524" class="body">这不是只能作者本机</text>
    <text x="1092" y="554" class="body">演示的私有流程。</text>
    <rect x="1092" y="590" width="156" height="36" rx="14" fill="#DDD6FE"/>
    <text x="1122" y="614" class="pill" fill="#6D28D9">Can ship</text>
  </g>

  <g opacity="0.92">
    <path d="M370 424H398" stroke="#486581" stroke-width="6" stroke-linecap="round"/>
    <path d="M700 424H728" stroke="#486581" stroke-width="6" stroke-linecap="round"/>
    <path d="M1030 424H1058" stroke="#486581" stroke-width="6" stroke-linecap="round"/>
    <path d="M382 400L410 424L382 448" stroke="#486581" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M712 400L740 424L712 448" stroke="#486581" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M1042 400L1070 424L1042 448" stroke="#486581" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="70" y="702" width="1290" height="180" rx="32" fill="url(#banner)"/>
    <text x="114" y="770" class="bannerText">Can move  →  Can live  →  Can improve  →  Can ship</text>
    <text x="114" y="820" class="bannerSub">所以 VLM 和 OpenClaw 没有“被删掉”，它们是今天这份 submission 说服力的一部分：</text>
    <text x="114" y="854" class="bannerSub">一个项目如果只会跑一次，不够；只会长期在线，不够；只有全部链条连起来，评委才看得到真正的落地厚度。</text>
  </g>
</svg>
