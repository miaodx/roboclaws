<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1440" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5EFE6"/>
      <stop offset="1" stop-color="#EEF8F4"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#102A43" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 48px 'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif; fill: #102A43; }
      .subtitle { font: 500 22px 'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif; fill: #486581; }
      .cardTitle { font: 700 22px 'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif; fill: #102A43; }
      .body { font: 500 17px 'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif; fill: #334E68; }
      .mono { font: 700 22px 'SFMono-Regular','Menlo','Consolas',monospace; fill: #0F172A; }
      .tiny { font: 700 16px 'SFMono-Regular','Menlo','Consolas',monospace; fill: #102A43; }
      .badge { font: 700 16px 'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif; }
      .banner { font: 700 30px 'SFMono-Regular','Menlo','Consolas',monospace; fill: #0F172A; }
    </style>
  </defs>

  <rect width="1440" height="980" fill="url(#bg)"/>

  <text x="84" y="96" class="title">同一天、同一任务、5 次迭代：Roboclaws 的 ROI 不是口号</text>
  <text x="84" y="136" class="subtitle">真正重要的不只是 Run 005 好看，而是每一轮都能解释“为什么下一轮会更好”</text>

  <g filter="url(#shadow)">
    <rect x="76" y="208" width="226" height="420" rx="28" fill="url(#card)"/>
    <text x="110" y="254" class="cardTitle">Run 001</text>
    <text x="110" y="286" class="body">manual baseline</text>
    <text x="110" y="346" class="mono">127+ calls</text>
    <text x="110" y="390" class="mono">3 / 9 targets</text>
    <text x="110" y="434" class="tiny">outcome: user interrupt</text>
    <text x="110" y="492" class="body">痛点全暴露：</text>
    <text x="110" y="524" class="body">yaw 要重摸、被动找物体、</text>
    <text x="110" y="552" class="body">L 形沙发困住 agent、</text>
    <text x="110" y="580" class="body">拍一张照片就要多次 framing。</text>
    <rect x="110" y="600" width="132" height="36" rx="14" fill="#FECACA"/>
    <text x="132" y="624" class="badge" fill="#991B1B">建立 baseline</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="344" y="258" width="226" height="370" rx="28" fill="url(#card)"/>
    <text x="378" y="304" class="cardTitle">Run 002</text>
    <text x="378" y="336" class="body">harness 托管，无代码改动</text>
    <text x="378" y="394" class="mono">55 calls</text>
    <text x="378" y="438" class="mono">3 / 9 targets</text>
    <text x="378" y="482" class="tiny">outcome: done</text>
    <text x="378" y="540" class="body">这轮最关键的意义：</text>
    <text x="378" y="572" class="body">先证明 measurement loop 成立，</text>
    <text x="378" y="600" class="body">再谈它能不能带来改进。</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="612" y="188" width="226" height="440" rx="28" fill="url(#card)"/>
    <text x="646" y="234" class="cardTitle">Run 003</text>
    <text x="646" y="266" class="body">+ scene_objects + skill 改写</text>
    <text x="646" y="326" class="mono">65 calls</text>
    <text x="646" y="370" class="mono">9 / 9 targets</text>
    <text x="646" y="414" class="tiny">outcome: timeout @ 600s</text>
    <text x="646" y="472" class="body">这轮证明：</text>
    <text x="646" y="504" class="body">skill / tool surface 的改变</text>
    <text x="646" y="532" class="body">真的能把 coverage 从 3/9</text>
    <text x="646" y="560" class="body">拉到 9/9。</text>
    <rect x="646" y="592" width="150" height="36" rx="14" fill="#D9FBEA"/>
    <text x="678" y="616" class="badge" fill="#166534">coverage ×3</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="880" y="258" width="226" height="370" rx="28" fill="url(#card)"/>
    <text x="914" y="304" class="cardTitle">Run 004</text>
    <text x="914" y="336" class="body">+ goto（引入 y 坐标 bug）</text>
    <text x="914" y="394" class="mono">aborted</text>
    <text x="914" y="438" class="tiny">10 / 10 goto failed</text>
    <text x="914" y="482" class="tiny">error: Collided with: Floor</text>
    <text x="914" y="540" class="body">这是最硬的一轮：</text>
    <text x="914" y="572" class="body">FakeEngine tests 没抓到，</text>
    <text x="914" y="600" class="body">harness 在真实物理里抓到了。</text>
    <rect x="914" y="600" width="162" height="36" rx="14" fill="#FDE68A"/>
    <text x="942" y="624" class="badge" fill="#92400E">physics bug surfaced</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1148" y="128" width="226" height="500" rx="28" fill="url(#card)"/>
    <text x="1182" y="174" class="cardTitle">Run 005</text>
    <text x="1182" y="206" class="body">修复 goto → clean closure</text>
    <text x="1182" y="266" class="mono">37 calls</text>
    <text x="1182" y="310" class="mono">9 / 9 targets</text>
    <text x="1182" y="354" class="tiny">outcome: done in 3.8 min</text>
    <text x="1182" y="414" class="body">10 / 10 goto 成功</text>
    <text x="1182" y="446" class="body">0 blocked moves</text>
    <text x="1182" y="478" class="body">agent 自己做 observe /</text>
    <text x="1182" y="506" class="body">observe_archived 成本权衡</text>
    <rect x="1182" y="540" width="156" height="38" rx="14" fill="#BBF7D0"/>
    <text x="1212" y="565" class="badge" fill="#166534">clean done</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="76" y="698" width="1298" height="182" rx="30" fill="#102A43"/>
    <text x="116" y="760" class="banner" fill="#F8FAFC">tool calls −71%   |   coverage ×3   |   human watch → review</text>
    <text x="116" y="812" class="body" fill="#D9E2EC">更重要的是：每轮只改一个主要变量，所以 Run 005 不是“好运气”，而是前 4 轮积累出来的可解释结果。</text>
    <text x="116" y="846" class="body" fill="#D9E2EC">Run 004 的失败没有被藏起来，反而成了评委判断业务价值和落地可信度的关键证据。</text>
  </g>
</svg>
