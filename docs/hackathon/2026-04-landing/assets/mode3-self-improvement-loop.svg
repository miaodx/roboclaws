<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="920" viewBox="0 0 1440 920" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1440" y2="920" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F2E8"/>
      <stop offset="1" stop-color="#EDF6FB"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
    <linearGradient id="phase1" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFF1E8"/>
      <stop offset="1" stop-color="#FDE7D7"/>
    </linearGradient>
    <linearGradient id="phase2" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#EEF5FF"/>
      <stop offset="1" stop-color="#DCEBFF"/>
    </linearGradient>
    <linearGradient id="phase3" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ECFDF3"/>
      <stop offset="1" stop-color="#D8F7E7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#102A43" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 48px 'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif; fill: #102A43; }
      .subtitle { font: 500 22px 'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif; fill: #486581; }
      .cardTitle { font: 700 26px 'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif; fill: #102A43; }
      .cardBody { font: 500 18px 'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif; fill: #334E68; }
      .mono { font: 700 18px 'SFMono-Regular','Menlo','Consolas',monospace; fill: #102A43; }
      .pill { font: 700 17px 'PingFang SC','Noto Sans CJK SC','Microsoft YaHei',sans-serif; }
      .metric { font: 700 28px 'SFMono-Regular','Menlo','Consolas',monospace; fill: #0F172A; }
    </style>
  </defs>

  <rect width="1440" height="920" fill="url(#bg)"/>

  <text x="84" y="96" class="title">Roboclaws — 为什么只有 Mode 3 能形成 self-improvement loop</text>
  <text x="84" y="134" class="subtitle">问题不只是“agent 能不能驱动机器人”，而是“下一轮能不能 cleanly 再跑一次，而且和上一轮可比较”</text>

  <g filter="url(#shadow)">
    <rect x="76" y="188" width="396" height="254" rx="28" fill="url(#phase1)"/>
    <text x="110" y="238" class="cardTitle">Phase 1 · 直接调 VLM API</text>
    <text x="110" y="282" class="cardBody">优点：最短路径，先把“能动起来”验证掉。</text>
    <text x="110" y="320" class="cardBody">问题：每一步都是独立 chat completion，</text>
    <text x="110" y="350" class="cardBody">没有 clean process lifecycle，baseline 不稳定。</text>
    <rect x="110" y="382" width="202" height="38" rx="14" fill="#FECACA"/>
    <text x="130" y="407" class="pill" fill="#991B1B">不能稳定做 repeated experiment</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="522" y="188" width="396" height="254" rx="28" fill="url(#phase2)"/>
    <text x="556" y="238" class="cardTitle">Phase 2 · OpenClaw Gateway</text>
    <text x="556" y="282" class="cardBody">优点：SOUL / memory / long-running agent 都成立，</text>
    <text x="556" y="312" class="cardBody">OpenClaw demo 与 Railway appliance 都来自这一层。</text>
    <text x="556" y="350" class="cardBody">问题：Gateway 常驻，状态在服务进程里，</text>
    <text x="556" y="380" class="cardBody">SOUL / chat history / memory 会污染下一轮。</text>
    <rect x="556" y="382" width="208" height="38" rx="14" fill="#DBEAFE"/>
    <text x="580" y="407" class="pill" fill="#1D4ED8">适合 runtime，不适合 clean rerun</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="968" y="188" width="396" height="254" rx="28" fill="url(#phase3)"/>
    <text x="1002" y="238" class="cardTitle">Phase 3 · Mode 3 + Harness</text>
    <text x="1002" y="282" class="cardBody">coding agent 本身就是一次性 CLI 进程，</text>
    <text x="1002" y="312" class="cardBody">可以被 tmux fresh spawn、统一 teardown。</text>
    <text x="1002" y="350" class="cardBody">每轮都有同构 trace / run_dir / runs-log，</text>
    <text x="1002" y="380" class="cardBody">终于能把“调 skill”变成可比较的测量闭环。</text>
    <rect x="1002" y="382" width="236" height="38" rx="14" fill="#BBF7D0"/>
    <text x="1028" y="407" class="pill" fill="#166534">the only clean path for repeatable runs</text>
  </g>

  <g opacity="0.92">
    <path d="M472 315H516" stroke="#486581" stroke-width="6" stroke-linecap="round"/>
    <path d="M918 315H962" stroke="#486581" stroke-width="6" stroke-linecap="round"/>
    <path d="M498 289L530 315L498 341" stroke="#486581" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M944 289L976 315L944 341" stroke="#486581" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="76" y="500" width="1288" height="324" rx="32" fill="url(#card)"/>
    <text x="114" y="554" class="cardTitle">Mode 3 下真正跑起来的 loop</text>

    <rect x="114" y="596" width="154" height="52" rx="18" fill="#FEF3C7"/>
    <text x="144" y="629" class="mono">task.txt</text>
    <path d="M274 622H330" stroke="#486581" stroke-width="4" stroke-linecap="round"/>

    <rect x="336" y="596" width="256" height="52" rx="18" fill="#D9EAFB"/>
    <text x="360" y="629" class="mono">just harness::run &lt;task&gt;</text>
    <path d="M598 622H654" stroke="#486581" stroke-width="4" stroke-linecap="round"/>

    <rect x="660" y="596" width="238" height="52" rx="18" fill="#FDE7D7"/>
    <text x="682" y="629" class="mono">fresh Claude / Codex</text>
    <path d="M904 622H960" stroke="#486581" stroke-width="4" stroke-linecap="round"/>

    <rect x="966" y="596" width="164" height="52" rx="18" fill="#E0FBF6"/>
    <text x="1001" y="629" class="mono">MCP server</text>
    <path d="M1136 622H1192" stroke="#486581" stroke-width="4" stroke-linecap="round"/>

    <rect x="1198" y="596" width="128" height="52" rx="18" fill="#E9D8FD"/>
    <text x="1230" y="629" class="mono">AI2-THOR</text>

    <text x="114" y="704" class="cardBody">每次 run 都会留下结构化产物：</text>
    <text x="114" y="742" class="metric">trace.jsonl  +  metrics.txt  +  snapshots  +  runs-log/NNN.md</text>
    <text x="114" y="790" class="cardBody">这让下一轮不再从“印象”开始，而是从一个明确的 hypothesis vs actual 出发。</text>
  </g>
</svg>
